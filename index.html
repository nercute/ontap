function usPickLetter(id, ch){
  const el = C('usl-'+id);
  if(!el || el.classList.contains('used')) return;
  el.classList.add('used');
  us.placed.push({ id, ch });
  renderSlots();
}

function renderSlots(){
  const w = us.words[us.idx];
  const slots = C('us-slots');
  if(!slots) return;
  if(!us.placed.length){
    slots.innerHTML = `<span style="font-size:12px;font-weight:700;color:#BDE0FE;pointer-events:none">Tap letters below ☝️</span>`;
    return;
  }
  const wordLengths = getWordLengths(w.w);
  const isMulti = wordLengths.length > 1;

  if(!isMulti){
    // single word — show each placed letter as slot
    slots.innerHTML = us.placed.map((p,i) =>
      `<div class="unsw-slot" onclick="usRemoveLetter(${i})" title="Tap to remove">${p.ch.toUpperCase()}</div>`
    ).join('');
  } else {
    // multi-word — group letters into words with gap between groups
    let html = '';
    let li = 0;
    wordLengths.forEach((len, wi) => {
      const group = us.placed.slice(li, li + len);
      // show filled slots for this word
      for(let k = 0; k < len; k++){
        const p = group[k];
        const absIdx = li + k;
        if(p){
          html += `<div class="unsw-slot" onclick="usRemoveLetter(${absIdx})" title="Tap to remove">${p.ch.toUpperCase()}</div>`;
        } else {
          html += `<div class="unsw-slot" style="opacity:.3;cursor:default">_</div>`;
        }
      }
      // gap between words
      if(wi < wordLengths.length - 1){
        html += `<div style="width:10px;flex-shrink:0"></div>`;
      }
      li += len;
    });
    slots.innerHTML = html;
  }
}

function usRemoveLetter(idx){
  const p = us.placed[idx];
  if(!p) return;
  const el = C('usl-'+p.id);
  if(el) el.classList.remove('used');
  us.placed.splice(idx, 1);
  renderSlots();
  const fb = C('us-fb'); if(fb) fb.innerHTML='';
  const sl = C('us-slots'); if(sl) sl.classList.remove('ok-bg','no-bg');
}

function usClear(){
  us.placed = [];
  document.querySelectorAll('.unsw-letter').forEach(el=>el.classList.remove('used'));
  renderSlots();
  const fb = C('us-fb'); if(fb) fb.innerHTML='';
  const sl = C('us-slots'); if(sl) sl.classList.remove('ok-bg','no-bg');
}

function usHint(word){
  const onlyLetters = word.replace(/ /g,'');
  const placed = us.placed.map(p=>p.ch).join('');
  const nextCh = onlyLetters[placed.length];
  if(!nextCh) return;
  const match = us.bank.find(lb => lb.ch.toLowerCase() === nextCh.toLowerCase() && !us.placed.find(p=>p.id===lb.id));
  if(match){ us.hintsUsed++; usPickLetter(match.id, match.ch); toast('💡 Hint: "' + nextCh.toUpperCase() + '"'); }
}

function usCheck(word){
  const placedChars = us.placed.map(p=>p.ch);
  // Insert spaces based on word structure
  const answer = insertSpaces(placedChars, word);
  const slots = C('us-slots');
  const fb = C('us-fb');
  if(!placedChars.length){ if(fb) fb.innerHTML=`<div class="unsw-fb no">⚠️ Tap some letters first!</div>`; return; }
  if(answer.toLowerCase() === word.toLowerCase()){
    if(slots) slots.classList.add('ok-bg');
    us.score++;
    speak(word);
    gdOnCorrect(slots,2);
    if(fb) fb.innerHTML=`<div class="unsw-fb ok">🎉 Correct! <strong>${word}</strong> — ${us.words[us.idx].m} <span style="color:#2E7D32;font-size:12px">+2 XP ⚡</span></div>
      <button class="unsw-next" onclick="us.idx++;renderUnscramble()">${us.idx+1>=us.words.length?'🏁 See results':'Next word →'}</button>`;
    document.querySelectorAll('.unsw-check,.unsw-hint-btn,.unsw-clear,.unsw-skip').forEach(b=>b.disabled=true);
  } else {
    if(slots){ slots.classList.add('no-bg'); setTimeout(()=>slots.classList.remove('no-bg'),600); }
    const onlyLetters = word.replace(/ /g,'');
    if(fb) fb.innerHTML=`<div class="unsw-fb no">❌ Not right! Need <strong>${onlyLetters.length}</strong> letters. Try again!</div>`;
  }
}

function renderUnscrambleDone(){
  const s = us.score, t = us.words.length;
  const pct = Math.round(s/t*100);
  const stars = pct>=90?'⭐⭐⭐':pct>=60?'⭐⭐':'⭐';
  const back = us.unitId>=0?`showUnit(${us.unitId})`:`showUnscrambleMenu()`;
  // track
  const unitTitle = us.unitId>=0?UNITS[us.unitId].title:us.unitId===-1?'My Words':'Tất cả Unit';
  sendToSheet({ unitId:us.unitId, unitTitle, mode:'Unscramble', score:s, total:t, startTime:sessionStart });

  C('content').innerHTML=`
  <button class="back-btn" onclick="${back}">← Quay lại</button>
  <div class="unsw">
    <div class="result-wrap pop">
      <div class="res-stars">${stars}</div>
      <div class="res-big">${s}/${t}</div>
      <div style="margin:6px 0"><span style="background:#F0FFF8;border:2px solid var(--mint);border-radius:50px;padding:4px 14px;font-size:12px;font-weight:800;color:#0E5C3C">🔀 Unscramble</span></div>
      <div class="res-msg">${pct===100?'🎉 Hoàn hảo! Bé giỏi lắm!':pct>=80?'🌟 Tuyệt vời!':pct>=60?'👍 Khá tốt!':'💪 Cố gắng thêm nhé!'}</div>
      ${us.hintsUsed?`<div style="font-size:13px;color:var(--muted);margin-top:8px;font-weight:600">💡 Đã dùng ${us.hintsUsed} gợi ý</div>`:''}
      <div class="res-btns" style="margin-top:16px">
        <button class="res-btn primary" onclick="startUnscramble(${us.unitId})">🔁 Chơi lại</button>
        <button class="res-btn secondary" onclick="${back}">← Quay lại</button>
      </div>
    </div>
  </div>`;
}

// ── Get current stage index from level ──
function gdGetStage(level){
  let s=0;
  for(let i=0;i<GD_STAGES.length;i++){ if(level>=GD_STAGES[i][0]) s=i; }
  return s;
}

// ── Update header badge ──
function gdUpdateBadge(){
  const el = C('garden-lv-badge');
  if(el) el.textContent = 'Lv'+GD.level;
}

// ── MAIN GARDEN PAGE ──
function showGarden(){
  setNav(1);
  const c = C('content');
  if(!GD.setupDone){ renderGardenSetup(c); return; }
  renderGardenMain(c);
}

function renderGardenSetup(c){
  c.innerHTML=`
  <div class="garden-page">
    <div class="unit-header pop">
      <h2>🌱 Trang Vườn Cây</h2>
      <p>Chọn nhân vật và loại cây để bắt đầu!</p>
    </div>
    <div class="gd-stat-card">
      <div class="gd-stat-label" style="margin-bottom:12px">Chọn nhân vật của bé</div>
      <div class="char-pick-row">
        ${GD_CHARS.map(ch=>`
          <div class="char-pick${GD.charId===ch.id?' selected':''}" onclick="GD.charId='${ch.id}';document.querySelectorAll('.char-pick').forEach(e=>e.classList.remove('selected'));this.classList.add('selected')">
            <div class="cp-emoji">${ch.emoji}</div>
            <div class="cp-name">${ch.name}</div>
          </div>`).join('')}
      </div>
    </div>
    <div class="gd-stat-card">
      <div class="gd-stat-label" style="margin-bottom:12px">Chọn loại cây muốn trồng</div>
      <div class="plant-pick-row">
        ${GD_PLANT_TYPES.map(pt=>`
          <div class="plant-pick${GD.plantType===pt.id?' selected':''}" onclick="GD.plantType='${pt.id}';document.querySelectorAll('.plant-pick').forEach(e=>e.classList.remove('selected'));this.classList.add('selected');this.querySelector('.pp-h').innerHTML=''">
            <div class="pp-h">${gdPlantSVG(pt.id,2)}</div>
            <div class="pp-name">${pt.name}</div>
          </div>`).join('')}
      </div>
    </div>
    <button class="next-btn" style="background:linear-gradient(135deg,#66BB6A,#2E7D32);box-shadow:0 4px 0 #1B5E20" onclick="gdConfirmSetup()">
      🌱 Bắt đầu trồng cây!
    </button>
  </div>`;
}

function gdConfirmSetup(){
  GD.setupDone=true;
  GD.stage=gdGetStage(GD.level);
  // Init garden with first chosen plant
  if(!GD.gardenSlots||!GD.gardenSlots.length){
    GD.gardenSlots=[{type:GD.plantType,stage:GD.stage,wilt:GD.wilt}];
  }
  gdSave(); showGarden();
}

function renderGardenMain(c){
  const stage=gdGetStage(GD.level);

// ── Remove a plant slot ──
function gdRemovePlant(idx){
  if(!GD.gardenSlots||idx===0) return;
  GD.gardenSlots.splice(idx,1);
  gdSave();
  renderGardenMain(C('content'));
}

function gdBuyWater(){ if(GD.coins<20){toast('Không đủ xu! 🪙');return;} GD.coins-=20;gdWaterPlant();gdSave();}
function gdBuyFertilizer(){ if(GD.coins<30){toast('Không đủ xu! 🪙');return;} GD.coins-=30;gdGainXP(20);toast('🌿 Phân bón: +20 XP!');renderGardenMain(C('content'));gdSave();}
function gdBuyXP(){ if(GD.coins<5){toast('Không đủ xu! 🪙');return;} GD.coins-=5;gdGainXP(10);toast('⚡ +10 XP!');renderGardenMain(C('content'));gdSave();}
function gdWaterPlant(){
  const today = new Date().toDateString();
  if(GD.lastWaterDate===today||GD.coins<20) return;
  GD.coins-=20; GD.lastWaterDate=today;
  // Grow ALL slots by 1 stage
  if(!GD.gardenSlots||!GD.gardenSlots.length){
    GD.gardenSlots=[{type:GD.plantType,stage:GD.stage,wilt:false}];
  }
  GD.gardenSlots.forEach(sl=>{
    sl.stage=Math.min(9,sl.stage+1);
    sl.wilt=false;
  });
  GD.stage=GD.gardenSlots[0].stage;
  GD.wilt=false;
  gdSave();
  // Water drop animation on scene
  const scene=C('gd-scene'); if(!scene){ renderGardenMain(C('content')); return; }
  for(let i=0;i<8;i++){
    setTimeout(()=>{
      const d=document.createElement('div');
      d.className='water-anim-el'; d.textContent='💧';
      d.style.cssText=`position:absolute;pointer-events:none;animation:waterDrop .7s ease-in forwards;font-size:${16+Math.random()*8}px;left:${15+Math.random()*70}%;top:50px;z-index:20`;
      scene.appendChild(d); setTimeout(()=>d.remove(),700);
    },i*100);
  }
  // Animate character with watering can
  const ch=C('gd-char');
  if(ch){ ch.innerHTML=`<div class="gd-char-body" style="animation:charBob 2s ease-in-out infinite">${gdCharSVG(GD.charId,'water')}</div>`; ch.style.left='20%'; }
  setTimeout(()=>{
    const pl=C('gd-plant');
    if(pl){
      pl.classList.add('pop','glowing');
      gdSpawnSparkles(pl,12);
      setTimeout(()=>pl.classList.remove('pop','glowing'),2000);
    }
    if(ch){ ch.innerHTML=`<div class="gd-char-body" style="animation:charBob 2s ease-in-out infinite">${gdCharSVG(GD.charId,'idle')}</div>`; ch.style.left='3%'; }
    toast('💧 Tưới cây thành công! Tất cả cây lớn thêm 1 stage! 🌿');
    setTimeout(()=>renderGardenMain(C('content')),400);
  },1000);
}

// ── Gain XP from answering ──
function gdGainXP(amount){
  const needed=gdXpForLevel(GD.level);
  GD.xp+=amount; GD.correctTotal++; GD.coinAccum++;
  // coin every 25 correct answers
  if(GD.coinAccum%25===0){ GD.coins++; gdShowCoinFloat(document.body,'🪙 +1 Xu! (25 câu đúng)'); }
  // level up check
  if(GD.xp>=needed&&GD.level<100){
    GD.xp-=needed; GD.level++;
    const newStage=gdGetStage(GD.level);
    if(newStage>GD.stage){ GD.stage=newStage; gdShowPlantGrow(); }
    gdShowLevelUp();
  }
  gdSave(); gdUpdateBadge();
}

function gdShowLevelUp(){
  const ov=C('gd-levelup'), bd=C('gd-lv-badge'), tx=C('gd-lv-text');
  if(!ov||!bd) return;
  if(tx) tx.textContent=`Lên Level ${GD.level}! 🎉`;
  ov.classList.add('show');
  gdSpawnSparkles(document.body, 16);
  setTimeout(()=>ov.classList.remove('show'),2800);
}

function gdShowPlantGrow(){
  const pl=C('gd-plant');
  if(!pl) return;
  pl.innerHTML=gdPlantSVG(GD.plantType,GD.stage,false);
  pl.classList.add('pop','glowing');
  gdSpawnSparkles(pl,10);
  setTimeout(()=>pl.classList.remove('pop','glowing'),2500);
}

function gdSpawnSparkles(el,n){
  const rect=(el===document.body)?{left:100,top:200,width:window.innerWidth-200,height:200}:el.getBoundingClientRect();
  const emojis=['✨','⭐','🌟','💫'];
  for(let i=0;i<n;i++){
    const sp=document.createElement('div');
    sp.className='sparkle-el';
    sp.textContent=emojis[Math.floor(Math.random()*emojis.length)];
    const angle=Math.random()*Math.PI*2, dist=40+Math.random()*70;
    sp.style.setProperty('--sx',Math.cos(angle)*dist+'px');
    sp.style.setProperty('--sy',Math.sin(angle)*dist+'px');
    sp.style.left=(rect.left+Math.random()*rect.width)+'px';
    sp.style.top=(rect.top+Math.random()*Math.min(rect.height,200))+'px';
    sp.style.animationDelay=Math.random()*400+'ms';
    document.body.appendChild(sp);
    setTimeout(()=>sp.remove(),1300);
  }
}

function gdShowXPFloat(x,y,amt){
  const el=document.createElement('div');
  el.className='xp-float-el'; el.textContent=`+${amt} XP ⚡`;
  el.style.left=x+'px'; el.style.top=y+'px';
  document.body.appendChild(el); setTimeout(()=>el.remove(),1200);
}

function gdShowCoinFloat(el,text){
  const rect=(el===document.body)?{left:window.innerWidth/2-20,top:window.innerHeight-150}:el.getBoundingClientRect();
  const fl=document.createElement('div');
  fl.className='coin-float-el'; fl.textContent=text;

  fl.style.fontFamily="'Baloo 2',cursive"; fl.style.fontSize='16px'; fl.style.fontWeight='800'; fl.style.color='#E65C00';
  document.body.appendChild(fl); setTimeout(()=>fl.remove(),1000);
}

// Called after each correct answer across all modes
function gdOnCorrect(btnEl, xpAmount){
  if(!GD.setupDone) return;
  const amt = xpAmount || 1;
  gdGainXP(amt);
  if(btnEl){
    const rect=btnEl.getBoundingClientRect();
    gdShowXPFloat(rect.left+rect.width/2-30, rect.top-10, amt);
  }
}

let myUID = null;

function getMyUID(){
  if(window.fsCurrentUID) return window.fsCurrentUID;
  let uid=localStorage.getItem('msnhi_uid');
  if(!uid){ uid='u'+Date.now().toString(36)+Math.random().toString(36).slice(2,6); localStorage.setItem('msnhi_uid',uid); }
  return uid;
}

function buildMyProfile(){
  const slots=GD.gardenSlots||[{type:GD.plantType||'rose',stage:GD.stage||0}];
  return { uid:myUID, name:studentName||'Bé học sinh', avatar:studentAvatar||'🌟', charId:GD.charId||'girl',
    level:GD.level||1, xp:GD.xp||0, coins:GD.coins||0, plantType:slots[0]?.type||'rose',

    lastSeen:new Date().toISOString(), displayId:localStorage.getItem('msnhi_uid')||myUID };

async function frSyncProfile(){
  if(!window.FB_READY||!myUID) return;
  try{ await window.fsSet('users/'+myUID, buildMyProfile(), true); } catch(e){}
}

function frInit(){
  myUID=getMyUID();
  setTimeout(()=>{ myUID=getMyUID(); frSyncProfile(); },1500);
  setInterval(()=>{ myUID=getMyUID(); frSyncProfile(); },60000);
}

async function frGetFriendsList(){
  if(!window.FB_READY||!myUID) return [];
  try{
    const snap=await window.fsGet('users/'+myUID);
    if(!snap.exists()) return [];
    const data=snap.data();
    return data.friends?Object.keys(data.friends):[];
  }catch(e){ return []; }
}

async function frSearchUser(uid){
  if(!window.FB_READY) return null;
  try{ const snap=await window.fsGet('users/'+uid.trim()); return snap.exists()?snap.data():null; }
  catch(e){ return null; }
}

async function frAddFriend(friendUID){
  if(!window.FB_READY||!myUID){ toast('❌ Cần kết nối Firebase!'); return; }
  if(friendUID===myUID){ toast('❌ Không thể kết bạn với chính mình!'); return; }
  const profile=await frSearchUser(friendUID);
  if(!profile){ toast('❌ Không tìm thấy người dùng này!'); return; }
  try{
    await window.fsUpdate('users/'+myUID,{[`friends.${friendUID}`]:{since:Date.now(),name:profile.name||'Bé'}});
    await window.fsUpdate('users/'+friendUID,{[`friends.${myUID}`]:{since:Date.now(),name:studentName||'Bé'}});

// Lưu vào localStorage
function saveResultLocal(data){
  try {
    const key = 'results_' + studentName.replace(/\s/g,'_');
    const existing = JSON.parse(localStorage.getItem(key) || '[]');
    existing.push(data);
    // Giữ tối đa 200 kết quả gần nhất
    if(existing.length > 200) existing.splice(0, existing.length - 200);
    localStorage.setItem(key, JSON.stringify(existing));
  } catch(e){}
}

// Gửi lên Google Sheets + retry queue thật sự
const RETRY_KEY = 'sheet_retry_queue';

function saveResultLocal(data){
  try {
    const key = 'results_' + (studentName||'guest').replace(/\s/g,'_');
    const existing = JSON.parse(localStorage.getItem(key) || '[]');
    existing.push(data);
    if(existing.length > 200) existing.splice(0, existing.length - 200);
    localStorage.setItem(key, JSON.stringify(existing));
  } catch(e){}
}

function addToRetryQueue(data){
  try {
    const q = JSON.parse(localStorage.getItem(RETRY_KEY) || '[]');
    q.push({ ...data, _retryAt: Date.now() });
    localStorage.setItem(RETRY_KEY, JSON.stringify(q));
  } catch(e){}
}

function removeFromRetryQueue(idx){
  try {
    const q = JSON.parse(localStorage.getItem(RETRY_KEY) || '[]');
    q.splice(idx, 1);
    localStorage.setItem(RETRY_KEY, JSON.stringify(q));
  } catch(e){}
}

function fetchToSheet(data){
  return fetch(SHEET_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(data)
  });
}

// Thử gửi hết hàng đợi khi có mạng
function flushRetryQueue(){
  try {
    const q = JSON.parse(localStorage.getItem(RETRY_KEY) || '[]');
    if(!q.length) return;
    // gửi từng cái, nếu thành công thì xóa
    q.forEach((data, idx) => {
      fetchToSheet(data)
        .then(() => {
          removeFromRetryQueue(0); // luôn xóa phần tử đầu vì đã gửi xong
          showSaveNotification('synced', `✅ Đã đồng bộ ${q.length} kết quả lên Sheet!`);
        })
        .catch(() => {}); // vẫn offline → giữ nguyên
    });
  } catch(e){}
}

function sendToSheet(payload){
  const data = {
    studentName,
    studentAvatar,
    unitId:    payload.unitId,
    unitTitle: payload.unitTitle || '',
    mode:      payload.mode || '',
    score:     payload.score,
    total:     payload.total,
    pct:       payload.total > 0 ? Math.round(payload.score / payload.total * 100) : 0,
    duration:  Math.round((Date.now() - (payload.startTime || sessionStart)) / 1000),
    time:      new Date().toLocaleString('vi-VN')
  };

  // 1) Lưu localStorage ngay
  saveResultLocal(data);

  // 2) Thông báo đang gửi
  showSaveNotification('sending');

  // 3) Gửi lên Sheet
  fetchToSheet(data)
    .then(() => {
      showSaveNotification('success');
      // Tranh thủ flush hàng đợi cũ nếu có
      flushRetryQueue();
    })
    .catch(() => {
      // Thực sự offline → đưa vào hàng đợi để gửi lại sau
      addToRetryQueue(data);
      const pending = JSON.parse(localStorage.getItem(RETRY_KEY) || '[]').length;
      showSaveNotification('offline', `💾 Mất kết nối — đã lưu máy (${pending} chờ đồng bộ)`);
    });
}

// Lắng nghe khi mạng trở lại → tự flush
window.addEventListener('online', () => {
  const pending = JSON.parse(localStorage.getItem(RETRY_KEY) || '[]').length;
  if(pending > 0){
    showSaveNotification('syncing', `📶 Có mạng! Đang đồng bộ ${pending} kết quả...`);
    setTimeout(flushRetryQueue, 1000);
  }
});

// Thông báo — 4 trạng thái
function showSaveNotification(state, customText){
  const old = C('save-notif');
  if(old) old.remove();

  const configs = {
    sending: { bg:'#FFF5FA', border:'#FFB3C6', icon:'📤', text:'Đang lưu kết quả...', color:'#C0394F', dur:0 },
    success: { bg:'#D4F4E2', border:'#3DB86A', icon:'✅', text:'Đã lưu kết quả thành công!', color:'#1A5C34', dur:3000 },
    offline: { bg:'#FFFBE6', border:'#FFE066', icon:'💾', text:'', color:'#7A5C00', dur:4000 },
    syncing: { bg:'#EFF8FF', border:'#BDE0FE', icon:'🔄', text:'', color:'#1A5080', dur:3000 },
    synced:  { bg:'#D4F4E2', border:'#3DB86A', icon:'🎉', text:'', color:'#1A5C34', dur:3000 },
  };
  const cfg = configs[state] || configs.success;
  const text = customText || cfg.text;

  const el = document.createElement('div');
  el.id = 'save-notif';
  el.innerHTML = `<div style="
    position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
    background:${cfg.bg};border:2.5px solid ${cfg.border};border-radius:50px;
    padding:12px 26px;display:flex;align-items:center;gap:10px;
    box-shadow:0 4px 24px rgba(0,0,0,.14);z-index:9999;
    font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;color:${cfg.color};
    white-space:nowrap;animation:popIn .25s both;">
    <span style="font-size:18px">${cfg.icon}</span>${text}
  </div>`;
  document.body.appendChild(el);
  if(cfg.dur > 0) setTimeout(() => { if(el.parentNode) el.remove(); }, cfg.dur);
}

// ══════ PASSWORD ══════
const CLASS_PW = 'lophoctienganhmsnhi';
const PW_KEY   = 'msnhi_pw_ok';

function checkPassword(){
  const val = (C('pw-input') ? C('pw-input').value : '').trim().toLowerCase();
  if(val === CLASS_PW){
    sessionStorage.setItem('pw_session', '1');
    C('pw-overlay').style.display = 'none';
    if(!studentName){
      C('profile-overlay').style.display = 'flex';
      setTimeout(()=>{ if(C('pi-name')) C('pi-name').focus(); }, 150);
    }
  } else {
    const inp = C('pw-input');
    if(inp){ inp.classList.add('wrong'); inp.value = ''; setTimeout(()=>inp.focus(), 100); }
    const err = C('pw-err');
    if(err) err.textContent = 'Wrong password. Try again!';
  }
}
