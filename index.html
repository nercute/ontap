<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⭐ Get Ready for Starters!</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@500;700;800&display=swap" rel="stylesheet">
<script>
window.FB_READY = false;
window.db = null;
window.auth = null;
window.fsCurrentUID = null;
</script>
<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import{getFirestore,doc,setDoc,getDoc,updateDoc,collection,getDocs,
        addDoc,query,where,orderBy,limit,serverTimestamp,deleteDoc}
  from'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
import{getAuth,signInAnonymously,onAuthStateChanged}
  from'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

const firebaseConfig={
  apiKey:"AIzaSyCVUYgHkS9K-RjrRbvvR18PQaGuG5DAROw",
  authDomain:"starter-76585.firebaseapp.com",
  projectId:"starter-76585",
  storageBucket:"starter-76585.firebasestorage.app",
  messagingSenderId:"276756717056",
  appId:"1:276756717056:web:ab0001efa42d9bef1342e5",
  measurementId:"G-CQVPQ4M1XZ"
};

try{
  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);
  const auth= getAuth(app);

  // Expose globals
  window.db   = db;
  window.auth = auth;

  // Firestore helpers (wrapping Firestore v9 modular API)
  window.fsDoc      = (path)=>doc(db, ...path.split('/'));
  window.fsSet      = (path, data, merge=false)=>setDoc(doc(db,...path.split('/')), data, merge?{merge:true}:{});
  window.fsGet      = (path)=>getDoc(doc(db,...path.split('/')));
  window.fsUpdate   = (path, data)=>updateDoc(doc(db,...path.split('/')), data);
  window.fsDelete   = (path)=>deleteDoc(doc(db,...path.split('/')));
  window.fsAdd      = (colPath, data)=>addDoc(collection(db, colPath), data);
  window.fsCol      = (colPath)=>collection(db, colPath);
  window.fsQuery    = query;
  window.fsWhere    = where;
  window.fsOrderBy  = orderBy;
  window.fsLimit    = limit;
  window.fsGetDocs  = getDocs;
  window.fsTs       = serverTimestamp;

  // Auto anonymous login
  signInAnonymously(auth).catch(e=>console.warn('Auth error:',e));

  onAuthStateChanged(auth, user=>{
    if(user){
      window.fsCurrentUID = user.uid;
      window.FB_READY = true;
      console.log('✅ Firebase + Auth OK, uid:', user.uid);
      // Sync profile once auth ready
      if(typeof frSyncProfile==='function') frSyncProfile();
    }
  });

}catch(e){
  window.FB_READY = false;
  console.warn('Firebase init error:', e.message);
}
</script>
<style>
:root{
  --pink:#FFB3C6;--yellow:#FFE066;--mint:#B5EAD7;--sky:#BDE0FE;
  --lavender:#C7B8EA;--peach:#FFDAC1;--coral:#FF9AA2;--lime:#CBFFA9;
  --bg:#FFF9F0;--white:#FFFEF7;--text:#2D2416;--muted:#8B7355;
  --r:18px;--rbig:24px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}
.blob{position:fixed;border-radius:50%;pointer-events:none;z-index:0;opacity:.3}
.blob1{width:500px;height:500px;background:radial-gradient(circle,#FFD6E8,transparent 70%);top:-150px;left:-150px}
.blob2{width:600px;height:600px;background:radial-gradient(circle,#D6EEFF,transparent 70%);bottom:-200px;right:-200px}
.blob3{width:350px;height:350px;background:radial-gradient(circle,#D6FFE8,transparent 70%);top:40%;left:60%}
#app{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column}
/* HEADER */
#header{background:var(--white);border-bottom:2.5px solid #F0E8DC;padding:12px 18px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;flex-wrap:wrap}
.logo{font-family:'Baloo 2',cursive;font-size:21px;font-weight:800;color:var(--text)}
.logo span{color:#E05A8A}
.header-right{margin-left:auto;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.hbadge{display:flex;align-items:center;gap:5px;border-radius:50px;padding:5px 12px;font-size:13px;font-weight:800;cursor:pointer;transition:.15s;border:2px solid}
.hbadge.streak{background:#FFF3CC;border-color:var(--yellow);color:#7A5C00}
.hbadge.stars{background:#FFF0F5;border-color:var(--pink);color:#C0394F}
.hbadge.stars:hover{background:#FFD6E8}
/* NAV */
#main-nav{background:var(--white);border-bottom:2px solid #F0E8DC;padding:0 14px;display:flex;gap:0;overflow-x:auto;scrollbar-width:none}
#main-nav::-webkit-scrollbar{display:none}
.mnav{padding:11px 15px;border:none;background:none;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;transition:.15s}
.mnav:hover{color:var(--text)}
.mnav.active{color:#E05A8A;border-bottom-color:#E05A8A}
/* CONTENT */
#content{flex:1;padding:18px 14px 80px;max-width:880px;margin:0 auto;width:100%}
/* HOME */
.home-hero{text-align:center;padding:24px 0 16px}
.home-hero h1{font-family:'Baloo 2',cursive;font-size:clamp(24px,5vw,38px);font-weight:800;line-height:1.1}
.home-hero h1 em{color:#E05A8A;font-style:normal}
.home-hero p{font-size:14px;color:var(--muted);font-weight:600;margin-top:6px}
.boss-banner{background:linear-gradient(135deg,#FF9AA2,#C7B8EA);border-radius:var(--rbig);padding:18px 20px;margin:14px 0;color:white;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.boss-icon{font-size:36px}
.boss-text h3{font-family:'Baloo 2',cursive;font-size:17px;font-weight:800}
.boss-text p{font-size:12px;opacity:.85;font-weight:600}
.boss-start{margin-left:auto;padding:9px 18px;border-radius:50px;border:2px solid white;background:transparent;color:white;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;transition:.15s;white-space:nowrap}
.boss-start:hover{background:rgba(255,255,255,.2)}
.units-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:11px;margin-top:18px}
.unit-card{background:var(--white);border-radius:var(--rbig);padding:16px 14px;cursor:pointer;transition:all .2s;border:2.5px solid transparent;box-shadow:0 3px 0 rgba(0,0,0,.07)}
.unit-card:hover{transform:translateY(-4px);box-shadow:0 8px 0 rgba(0,0,0,.1)}
.uc-num{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;opacity:.65}
.uc-title{font-family:'Baloo 2',cursive;font-size:15px;font-weight:700;line-height:1.2;margin-bottom:7px}
.uc-count{font-size:11px;font-weight:700;color:var(--muted)}
.uc-bar{height:5px;border-radius:3px;background:#F0EDE6;margin-top:9px;overflow:hidden}
.uc-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#FF9AA2,#FFB347);transition:width .4s}
.uc0{border-color:#FFB3C6;background:#FFF5F8}.uc0 .uc-num{color:#C0394F}
.uc1{border-color:#BDE0FE;background:#F0F8FF}.uc1 .uc-num{color:#1A6FA6}
.uc2{border-color:#B5EAD7;background:#F0FFF8}.uc2 .uc-num{color:#1A7A4A}
.uc3{border-color:#FFE066;background:#FFFBE6}.uc3 .uc-num{color:#7A5C00}
.uc4{border-color:#C7B8EA;background:#F5F0FF}.uc4 .uc-num{color:#5A3E8A}
.uc5{border-color:#FFDAC1;background:#FFF6EF}.uc5 .uc-num{color:#8A4A1A}
.uc6{border-color:#CBFFA9;background:#F5FFF0}.uc6 .uc-num{color:#3A6A1A}
.uc7{border-color:#FFB3C6;background:#FFF5F8}.uc7 .uc-num{color:#C0394F}
.uc8{border-color:#BDE0FE;background:#F0F8FF}.uc8 .uc-num{color:#1A6FA6}
.uc9{border-color:#B5EAD7;background:#F0FFF8}.uc9 .uc-num{color:#1A7A4A}
.uc10{border-color:#FFE066;background:#FFFBE6}.uc10 .uc-num{color:#7A5C00}
.uc11{border-color:#C7B8EA;background:#F5F0FF}.uc11 .uc-num{color:#5A3E8A}
.uc12{border-color:#FFDAC1;background:#FFF6EF}.uc12 .uc-num{color:#8A4A1A}
.uc13{border-color:#CBFFA9;background:#F5FFF0}.uc13 .uc-num{color:#3A6A1A}
.uc14{border-color:#FFB3C6;background:#FFF5F8}.uc14 .uc-num{color:#C0394F}
.uc15{border-color:#BDE0FE;background:#F0F8FF}.uc15 .uc-num{color:#1A6FA6}
.uc16{border-color:#B5EAD7;background:#F0FFF8}.uc16 .uc-num{color:#1A7A4A}
.uc17{border-color:#FFE066;background:#FFFBE6}.uc17 .uc-num{color:#7A5C00}
/* BACK BTN */
.back-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:50px;border:2px solid #E0D8CC;background:var(--white);font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;color:var(--muted);transition:.15s;margin-bottom:14px}
.back-btn:hover{border-color:#FF9AA2;color:#C0394F}
/* UNIT HEADER */
.unit-header{background:var(--white);border-radius:var(--rbig);padding:18px 20px;margin-bottom:14px;border:2.5px solid #F0E8DC}
.unit-header h2{font-family:'Baloo 2',cursive;font-size:22px;font-weight:800}
.unit-header p{font-size:13px;color:var(--muted);font-weight:600;margin-top:4px}
.starred-only-toggle{display:flex;align-items:center;gap:10px;padding:11px 15px;background:var(--white);border-radius:var(--r);margin-bottom:14px;border:2px solid #F0E8DC}
.sot-label{font-size:14px;font-weight:700;flex:1}
.toggle-sw{width:42px;height:23px;border-radius:12px;background:#E0D8CC;position:relative;cursor:pointer;transition:.2s;border:none;flex-shrink:0}
.toggle-sw.on{background:#FFB347}
.toggle-sw::after{content:'';position:absolute;width:17px;height:17px;background:white;border-radius:50%;top:3px;left:3px;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle-sw.on::after{left:22px}
/* MODE GRID */
.mode-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:9px;margin-bottom:18px}
.mode-btn{padding:14px 10px;border-radius:var(--r);border:2.5px solid transparent;background:var(--white);cursor:pointer;text-align:center;transition:all .2s;box-shadow:0 2px 0 rgba(0,0,0,.06)}
.mode-btn:hover{transform:translateY(-3px);box-shadow:0 6px 0 rgba(0,0,0,.1)}
.mb-icon{font-size:26px;margin-bottom:5px}
.mb-name{font-size:13px;font-weight:800;color:var(--text)}
.mb-desc{font-size:10px;color:var(--muted);font-weight:600;margin-top:2px}
.mb-flash{border-color:#FFB3C6;background:#FFF5F8}
.mb-quiz{border-color:#BDE0FE;background:#F0F8FF}
.mb-type{border-color:#B5EAD7;background:#F0FFF8}
.mb-mem{border-color:#FFE066;background:#FFFBE6}
.mb-drag{border-color:#C7B8EA;background:#F5F0FF}
.mb-speak{border-color:#FFDAC1;background:#FFF6EF}
/* FLASHCARD */
.fc-wrapper{display:flex;flex-direction:column;align-items:center;padding:8px 0}
.fc-progress{width:100%;max-width:480px;height:7px;background:#F0EDE6;border-radius:4px;margin-bottom:16px;overflow:hidden}
.fc-prog-fill{height:100%;background:linear-gradient(90deg,#FF9AA2,#FFB347);border-radius:4px;transition:width .4s}
.fc-counter{font-size:13px;font-weight:800;color:var(--muted);margin-bottom:14px}
.flashcard{width:100%;max-width:400px;height:250px;perspective:1000px;cursor:pointer;margin-bottom:20px}
.fc-inner{width:100%;height:100%;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.4,0,.2,1);position:relative}
.flashcard.flipped .fc-inner{transform:rotateY(180deg)}
.fc-face{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:var(--rbig);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:22px;box-shadow:0 6px 0 rgba(0,0,0,.1)}
.fc-front{background:var(--white);border:3px solid #F0E8DC}
.fc-back{background:linear-gradient(135deg,#FFF0F5,#F0F8FF);border:3px solid var(--pink);transform:rotateY(180deg)}
.fc-emoji{font-size:48px;margin-bottom:9px}
.fc-word{font-family:'Baloo 2',cursive;font-size:28px;font-weight:800;color:var(--text);text-align:center}
.fc-phonetic{font-size:13px;color:var(--muted);font-weight:600;margin-top:5px}
.fc-hint{font-size:11px;color:#CBBEA8;font-weight:700;margin-top:14px}
.fc-meaning{font-family:'Baloo 2',cursive;font-size:24px;font-weight:700;color:#E05A8A;text-align:center}
.fc-en-hint{font-size:13px;color:var(--muted);font-weight:600;margin-top:7px}
.fc-controls{display:flex;gap:10px;align-items:center;margin-bottom:14px}
.fc-btn{width:48px;height:48px;border-radius:50%;border:none;font-size:20px;cursor:pointer;transition:all .2s;box-shadow:0 3px 0 rgba(0,0,0,.1)}
.fc-btn:hover{transform:translateY(-2px)}
.fc-prev{background:#F5F0FF}
.fc-star{background:var(--yellow)}
.fc-star.starred{background:#FFB347}
.fc-next{background:#F0FFF8}
.fc-speak-btn{background:#E0F8FF;width:42px;height:42px;font-size:17px}
.fc-swap{background:#FFF5F8;padding:7px 15px;border-radius:50px;border:2px solid var(--pink);font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;color:#C0394F;cursor:pointer;transition:.15s}
.fc-swap:hover{background:#FFD6E8}
.fc-done-box{text-align:center;padding:28px;background:var(--white);border-radius:var(--rbig);border:2.5px solid #F0E8DC;width:100%;max-width:400px}
.replay-btn{padding:11px 26px;border-radius:50px;border:none;background:linear-gradient(135deg,#FF9AA2,#FFB347);color:white;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;cursor:pointer;box-shadow:0 4px 0 #E07030;transition:.15s;margin:4px}
.replay-btn:hover{transform:translateY(-2px)}
/* QUIZ */
.quiz-wrap{max-width:520px;margin:0 auto}
.quiz-scorebar{display:flex;align-items:center;gap:12px;background:var(--white);border-radius:var(--r);padding:11px 16px;margin-bottom:14px;border:2px solid #F0E8DC}
.qs-score{font-family:'Baloo 2',cursive;font-size:24px;font-weight:800;color:#E05A8A}
.qs-lbl{font-size:11px;color:var(--muted);font-weight:700}
.qs-prog{flex:1;height:9px;background:#F0EDE6;border-radius:5px;overflow:hidden}
.qs-fill{height:100%;background:linear-gradient(90deg,#FF9AA2,#FFB347);border-radius:5px;transition:width .4s}
.qs-num{font-size:12px;font-weight:800;color:var(--muted)}
.quiz-card{background:var(--white);border-radius:var(--rbig);padding:26px 20px;border:3px solid var(--sky);box-shadow:0 4px 0 rgba(0,0,0,.07)}
.qc-emoji{font-size:56px;text-align:center;display:block;margin-bottom:10px}
.qc-q{font-family:'Baloo 2',cursive;font-size:17px;font-weight:700;text-align:center;margin-bottom:18px;line-height:1.4}
.qc-q strong{color:#E05A8A}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.opt{padding:13px;border-radius:var(--r);border:2.5px solid #EDE8E0;background:#FAFAF5;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:.18s;text-align:center;color:var(--text)}
.opt:hover:not(:disabled){border-color:var(--sky);background:#EFF8FF;transform:translateY(-2px)}
.opt.correct{background:#D4F4E2;border-color:#3DB86A;color:#1A5C34}
.opt.wrong{background:#FFE4E4;border-color:#E05A5A;color:#7A1A1A}
.qc-fb{margin-top:12px;padding:11px 15px;border-radius:var(--r);font-size:13px;font-weight:700;text-align:center}
.qc-fb.ok{background:#D4F4E2;color:#1A5C34}
.qc-fb.no{background:#FFE4E4;color:#7A1A1A}
.qc-next{display:block;width:100%;margin-top:11px;padding:12px;border-radius:var(--r);border:none;background:linear-gradient(135deg,#FF9AA2,#FFB347);color:white;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;cursor:pointer;box-shadow:0 4px 0 #E07030;transition:.15s}
.qc-next:hover{transform:translateY(-2px)}
.result-wrap{text-align:center;padding:36px 20px;background:var(--white);border-radius:var(--rbig);border:3px solid #F0E8DC}
.res-stars{font-size:38px;margin-bottom:10px}
.res-big{font-family:'Baloo 2',cursive;font-size:52px;font-weight:800;color:#E05A8A}
.res-msg{font-size:15px;font-weight:700;color:var(--muted);margin-top:7px}
.res-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:16px}
.res-btn{padding:11px 22px;border-radius:50px;border:none;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;transition:.15s}
.res-btn.primary{background:linear-gradient(135deg,#FF9AA2,#FFB347);color:white;box-shadow:0 4px 0 #E07030}
.res-btn.secondary{background:var(--white);border:2px solid #E0D8CC;color:var(--muted)}
.res-btn:hover{transform:translateY(-2px)}
.wrong-chip{background:#FFE4E4;border:2px solid #E05A5A;border-radius:50px;padding:4px 12px;font-size:12px;font-weight:700;color:#7A1A1A;display:inline-block;margin:3px}
/* TYPING */
.type-wrap{max-width:460px;margin:0 auto}
.type-card{background:var(--white);border-radius:var(--rbig);padding:28px 22px;border:3px solid var(--mint);box-shadow:0 4px 0 rgba(0,0,0,.07);text-align:center;margin-bottom:12px}
.type-emoji{font-size:52px;margin-bottom:9px}
.type-meaning{font-family:'Baloo 2',cursive;font-size:21px;font-weight:700;color:#E05A8A;margin-bottom:5px}
.type-phonetic{font-size:12px;color:var(--muted);font-weight:600;margin-bottom:18px}
.type-hint-row{display:flex;gap:5px;justify-content:center;margin-bottom:14px;flex-wrap:wrap}
.type-letter{width:34px;height:34px;border-radius:8px;border:2.5px solid #D0E8FF;background:#F0F8FF;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:#1A5080;transition:.2s}
.type-letter.filled{background:#BDE0FE;border-color:#378ADD}
.type-letter.correct{background:#D4F4E2;border-color:#3DB86A;color:#1A5C34}
.type-letter.wrong-l{background:#FFE4E4;border-color:#E05A5A;color:#7A1A1A}
.type-input{width:100%;padding:13px 15px;border-radius:var(--r);border:2.5px solid #D0E8FF;font-family:'Nunito',sans-serif;font-size:17px;font-weight:800;text-align:center;outline:none;background:#F8FCFF;color:var(--text);transition:.2s}
.type-input:focus{border-color:#378ADD;background:white}
.type-input.correct-in{border-color:#3DB86A;background:#D4F4E2;color:#1A5C34}
.type-input.wrong-in{border-color:#E05A5A;background:#FFE4E4;color:#7A1A1A}
.type-action{display:flex;gap:9px;margin-top:11px}
.type-check{flex:1;padding:12px;border-radius:var(--r);border:none;background:linear-gradient(135deg,#B5EAD7,#89D9BB);color:#0E5C3C;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;cursor:pointer;box-shadow:0 4px 0 #2A9B6A;transition:.15s}
.type-check:hover{transform:translateY(-2px)}
.type-skip{padding:12px 16px;border-radius:var(--r);border:2px solid #E0D8CC;background:white;font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;cursor:pointer;color:var(--muted);transition:.15s}
.type-skip:hover{border-color:#FF9AA2;color:#C0394F}
.type-fb{padding:11px;border-radius:var(--r);font-size:13px;font-weight:700;text-align:center;margin-top:9px}
.type-fb.ok{background:#D4F4E2;color:#1A5C34}
.type-fb.no{background:#FFE4E4;color:#7A1A1A}
/* MEMORY */
.mem-wrap{width:100%}
.mem-stats{display:flex;gap:10px;margin-bottom:14px}
.mem-stat{background:var(--white);border-radius:var(--r);padding:9px 14px;flex:1;text-align:center;border:2px solid #F0E8DC}
.ms-val{font-family:'Baloo 2',cursive;font-size:20px;font-weight:800}
.ms-lbl{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase}
.mem-grid{display:grid;gap:7px}
.mem-card{aspect-ratio:1;border-radius:var(--r);cursor:pointer;perspective:600px}
.mem-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .4s;border-radius:var(--r)}
.mem-card.open .mem-inner,.mem-card.matched .mem-inner{transform:rotateY(180deg)}
.mem-face{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-weight:800;text-align:center;padding:5px;box-shadow:0 3px 0 rgba(0,0,0,.08)}
.mem-back-face{background:linear-gradient(135deg,#C7B8EA,#B5EAD7);color:white;font-size:20px}
.mem-front-face{background:var(--white);border:2.5px solid #D0E8FF;color:var(--text);transform:rotateY(180deg);font-size:clamp(11px,2.2vw,15px)}
.mem-card.matched .mem-front-face{background:#D4F4E2;border-color:#3DB86A;color:#1A5C34}
/* DRAG DROP */
.drag-wrap{max-width:560px;margin:0 auto}
.drag-card{background:var(--white);border-radius:var(--rbig);padding:20px 18px;border:3px solid var(--mint);box-shadow:0 4px 0 rgba(0,0,0,.07);margin-bottom:12px}
.dc-hint{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:5px}
.dc-prompt{font-family:'Baloo 2',cursive;font-size:16px;font-weight:700;background:#FFF5FA;border-radius:10px;padding:9px 13px;margin-bottom:12px;border-left:4px solid var(--pink)}
.drop-area{min-height:54px;border:3px dashed #D8D0C5;border-radius:13px;padding:9px;display:flex;flex-wrap:wrap;gap:7px;align-items:center;background:#FAFAF5;margin-bottom:11px;transition:.2s}
.drop-area.dov{border-color:#1D9E75;background:#F0FFF8}
.drop-area.ok{border-color:#3DB86A;background:#D4F4E2}
.drop-area.no{border-color:#E05A5A;background:#FFE4E4}
.dph{font-size:12px;font-weight:700;color:#C4B8A8;pointer-events:none;margin:auto}
.tok{display:inline-flex;align-items:center;padding:6px 12px;border-radius:50px;font-size:13px;font-weight:800;cursor:pointer;user-select:none;transition:.18s}
.tok.bank{background:white;border:2.5px solid #D0E8FF;color:#1A5080;box-shadow:0 2px 0 rgba(0,0,0,.06)}
.tok.bank:hover{border-color:var(--sky);transform:translateY(-2px)}
.tok.bank.used{opacity:.3;pointer-events:none}
.tok.placed{background:#E8F8FF;border:2.5px solid var(--sky);color:#1A5080}
.tok.placed:hover{background:#FFE4E4;border-color:#E05A5A;color:#7A1A1A}
.word-bank{display:flex;flex-wrap:wrap;gap:7px;min-height:42px;padding:9px;background:#F5F3EE;border-radius:11px;margin-bottom:11px}
.dc-actions{display:flex;gap:9px}
.dc-check{flex:1;padding:11px;border-radius:var(--r);border:none;background:linear-gradient(135deg,#B5EAD7,#89D9BB);color:#0E5C3C;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;box-shadow:0 4px 0 #2A9B6A;transition:.15s}
.dc-check:hover{transform:translateY(-2px)}
.dc-clear{padding:11px 15px;border-radius:var(--r);border:2px solid #E0D8CC;background:white;font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;cursor:pointer;color:var(--muted)}
.dc-clear:hover{border-color:#FF9AA2;color:#C0394F}
.dc-res{margin-top:9px;padding:10px 13px;border-radius:var(--r);font-size:13px;font-weight:700;text-align:center}
.dc-res.ok{background:#D4F4E2;color:#1A5C34}
.dc-res.no{background:#FFE4E4;color:#7A1A1A}
.dc-res.hint{background:#FFF5CC;color:#7A5C00}
.dc-next{margin-top:9px;width:100%;padding:11px;border-radius:var(--r);border:none;background:linear-gradient(135deg,#FF9AA2,#FFB347);color:white;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;box-shadow:0 4px 0 #E07030;transition:.15s}
.dc-next:hover{transform:translateY(-2px)}
/* ─── SPEAKING ─── */
.speak-wrap{max-width:600px;margin:0 auto}
.speak-intro{background:linear-gradient(135deg,#FFDAC1,#FFB3C6);border-radius:var(--rbig);padding:18px 20px;margin-bottom:16px;color:var(--text)}
.speak-intro h3{font-family:'Baloo 2',cursive;font-size:19px;font-weight:800;margin-bottom:4px}
.speak-intro p{font-size:13px;font-weight:600;opacity:.8}
.speak-card{background:var(--white);border-radius:var(--rbig);padding:24px 20px;border:3px solid var(--peach);box-shadow:0 4px 0 rgba(0,0,0,.07);margin-bottom:12px}
.speak-num{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.speak-question{font-family:'Baloo 2',cursive;font-size:20px;font-weight:800;color:var(--text);margin-bottom:6px;line-height:1.3}
.speak-vi{font-size:13px;color:#E05A8A;font-weight:700;margin-bottom:16px}
.speak-answer-hint{background:#FFF5FA;border-radius:12px;padding:11px 14px;font-size:14px;color:var(--muted);font-weight:600;margin-bottom:14px;border-left:3px solid var(--pink)}
.speak-answer-hint strong{color:var(--text)}
.speak-btns{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.speak-play{display:flex;align-items:center;gap:7px;padding:11px 20px;border-radius:50px;border:none;background:linear-gradient(135deg,#FFDAC1,#FF9AA2);color:white;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;cursor:pointer;box-shadow:0 4px 0 #E07030;transition:.15s}
.speak-play:hover{transform:translateY(-2px)}
.speak-play.playing{background:linear-gradient(135deg,#B5EAD7,#06D6A0)}
.speak-answer-btn{display:flex;align-items:center;gap:7px;padding:11px 18px;border-radius:50px;border:2px solid var(--mint);background:var(--white);color:#1A7A4A;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;transition:.15s}
.speak-answer-btn:hover{background:#F0FFF8}
.speak-mic{padding:11px 18px;border-radius:50px;border:2px solid var(--lavender);background:var(--white);color:#5A3E8A;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:6px}
.speak-mic:hover{background:#F5F0FF}
.speak-mic.recording{background:#FFE4E4;border-color:#E05A5A;color:#7A1A1A;animation:pulse .8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.speak-answer-reveal{background:#F0FFF8;border-radius:12px;padding:12px 16px;margin-top:12px;display:none;border:2px solid var(--mint)}
.speak-answer-reveal.show{display:block}
.speak-answer-reveal .sa-label{font-size:11px;font-weight:800;color:#1A7A4A;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.speak-answer-reveal .sa-text{font-family:'Baloo 2',cursive;font-size:16px;font-weight:700;color:#1A5C34}
.speak-nav{display:flex;justify-content:space-between;align-items:center;margin-top:14px}
.speak-nav-btn{padding:9px 18px;border-radius:50px;border:2px solid #E0D8CC;background:var(--white);font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;color:var(--muted);transition:.15s}
.speak-nav-btn:hover{border-color:#FF9AA2;color:#C0394F}
.speak-progress{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px}
.sp-dot{width:10px;height:10px;border-radius:50%;background:#F0EDE6;transition:.2s}
.sp-dot.done{background:#3DB86A}
.sp-dot.active{background:#E05A8A}
/* MY WORDS */
.mw-empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:15px;font-weight:600}
.mw-empty span{font-size:40px;display:block;margin-bottom:10px}
.mw-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:9px}
.mw-card{background:var(--white);border-radius:var(--r);padding:13px 11px;text-align:center;border:2.5px solid var(--yellow);cursor:pointer;transition:all .2s;position:relative}
.mw-card:hover{transform:translateY(-3px);box-shadow:0 6px 0 rgba(0,0,0,.08)}
.mw-emoji{font-size:26px;margin-bottom:5px}
.mw-word{font-size:13px;font-weight:800;color:var(--text)}
.mw-meaning{font-size:11px;color:#E05A8A;font-weight:700;margin-top:3px}
.mw-unstar{position:absolute;top:5px;right:5px;width:20px;height:20px;border-radius:50%;border:none;background:#FFF0CC;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.mw-play-row{display:flex;gap:9px;margin-bottom:14px;flex-wrap:wrap}
.mw-play-btn{padding:9px 18px;border-radius:50px;border:none;font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;cursor:pointer;transition:.15s}
.mw-play-btn:hover{transform:translateY(-2px)}
.mw-play-btn.pq{background:#BDE0FE;color:#1A5080;box-shadow:0 3px 0 rgba(0,0,0,.08)}
.mw-play-btn.pt{background:#B5EAD7;color:#1A5080;box-shadow:0 3px 0 rgba(0,0,0,.08)}
.mw-play-btn.pm{background:#FFE066;color:#7A5C00;box-shadow:0 3px 0 rgba(0,0,0,.08)}
.sec-title{font-family:'Baloo 2',cursive;font-size:18px;font-weight:700;margin-bottom:11px}
/* TOAST */
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#2D2416;color:white;padding:9px 18px;border-radius:50px;font-size:13px;font-weight:700;opacity:0;pointer-events:none;transition:opacity .3s;z-index:9999;white-space:nowrap}
#toast.show{opacity:1}
@keyframes popIn{from{opacity:0;transform:scale(.75) translateY(18px)}to{opacity:1;transform:scale(1) translateY(0)}}
.pop{animation:popIn .28s both}
/* ─── TEXT QUIZ ─── */
.mb-tquiz{border-color:#FFE066;background:#FFFBE6}
.mb-tquiz-total{border-color:#FF9AA2;background:#FFF5F8}
.tq-wrap{max-width:540px;margin:0 auto}
.tq-header{background:var(--white);border-radius:var(--rbig);padding:14px 18px;margin-bottom:14px;border:2.5px solid #F0E8DC;display:flex;align-items:center;gap:12px}
.tq-mode-pill{padding:5px 14px;border-radius:50px;font-size:12px;font-weight:800;border:2px solid}
.tq-mode-pill.en{background:#FFFBE6;border-color:#FFE066;color:#7A5C00}
.tq-mode-pill.vi{background:#E8F8FF;border-color:var(--sky);color:#1A5080}
.tq-swap-btn{margin-left:auto;padding:6px 14px;border-radius:50px;border:2px solid #E0D8CC;background:var(--white);font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;cursor:pointer;color:var(--muted);transition:.15s}
.tq-swap-btn:hover{border-color:var(--pink);color:#C0394F}
.tq-card{background:var(--white);border-radius:var(--rbig);padding:28px 22px;box-shadow:0 4px 0 rgba(0,0,0,.08);margin-bottom:14px;transition:border-color .2s}
.tq-card.mode-en{border:3px solid var(--yellow)}
.tq-card.mode-vi{border:3px solid var(--sky)}
.tq-question-label{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;display:flex;align-items:center;gap:7px}
.tq-question-label.en{color:#7A5C00}
.tq-question-label.vi{color:#1A5080}
.tq-question{font-family:'Baloo 2',cursive;font-size:26px;font-weight:800;color:var(--text);text-align:center;margin-bottom:6px;line-height:1.2}
.tq-phonetic{font-size:14px;color:var(--muted);font-weight:600;text-align:center;margin-bottom:22px}
.tq-opts{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tq-opt{padding:15px 12px;border-radius:var(--r);border:2.5px solid #EDE8E0;background:#FAFAF5;font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .18s;text-align:center;color:var(--text);line-height:1.3}
.tq-opt:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 4px 0 rgba(0,0,0,.08)}
.tq-opt.mode-en:hover:not(:disabled){border-color:#FFE066;background:#FFFBE6}
.tq-opt.mode-vi:hover:not(:disabled){border-color:var(--sky);background:#EFF8FF}
.tq-opt.correct{background:#D4F4E2;border-color:#3DB86A;color:#1A5C34}
.tq-opt.wrong{background:#FFE4E4;border-color:#E05A5A;color:#7A1A1A}
.tq-fb{margin-top:14px;padding:12px 16px;border-radius:var(--r);font-size:14px;font-weight:700;text-align:center}
.tq-fb.ok{background:#D4F4E2;color:#1A5C34}
.tq-fb.no{background:#FFE4E4;color:#7A1A1A}
.tq-next{display:block;width:100%;margin-top:12px;padding:13px;border-radius:var(--r);border:none;background:linear-gradient(135deg,#FF9AA2,#FFB347);color:white;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;cursor:pointer;box-shadow:0 4px 0 #E07030;transition:.15s}
.tq-next:hover{transform:translateY(-2px)}
.tq-scorebar{display:flex;align-items:center;gap:12px;background:var(--white);border-radius:var(--r);padding:11px 16px;margin-bottom:14px;border:2px solid #F0E8DC}
.tq-score-big{font-family:'Baloo 2',cursive;font-size:24px;font-weight:800;color:#E05A8A}
.tq-score-lbl{font-size:11px;color:var(--muted);font-weight:700}
.tq-prog{flex:1;height:9px;background:#F0EDE6;border-radius:5px;overflow:hidden}
.tq-prog-fill{height:100%;background:linear-gradient(90deg,#FFE066,#FFB347);border-radius:5px;transition:width .4s}
.tq-count{font-size:12px;font-weight:800;color:var(--muted);white-space:nowrap}
/* review panel */
.tq-review{margin-top:14px}
.tq-review-title{font-size:14px;font-weight:800;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.tq-review-list{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.tq-review-item{border-radius:var(--r);padding:10px 12px;font-size:13px}
.tq-review-item.ok{background:#D4F4E2;border:2px solid #3DB86A}
.tq-review-item.no{background:#FFE4E4;border:2px solid #E05A5A}
.tq-review-item .rw{font-weight:800;color:var(--text)}
.tq-review-item .rm{font-weight:600;color:var(--muted);margin-top:2px;font-size:12px}
/* ─── DICTIONARY ─── */
.dict-wrap{max-width:680px;margin:0 auto}
.dict-search-bar{position:relative;margin-bottom:16px}
.dict-input{width:100%;padding:14px 50px 14px 48px;border-radius:50px;border:2.5px solid #F0E8DC;background:var(--white);font-family:'Nunito',sans-serif;font-size:16px;font-weight:700;color:var(--text);outline:none;transition:.2s;box-shadow:0 3px 0 rgba(0,0,0,.06)}
.dict-input:focus{border-color:var(--pink);box-shadow:0 3px 0 rgba(224,90,138,.15)}
.dict-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:20px;pointer-events:none}
.dict-clear{position:absolute;right:14px;top:50%;transform:translateY(-50%);width:28px;height:28px;border-radius:50%;border:none;background:#F0E8DC;cursor:pointer;font-size:14px;display:none;align-items:center;justify-content:center;color:var(--muted)}
.dict-clear.show{display:flex}
.dict-clear:hover{background:var(--coral);color:white}
.dict-filter-row{display:flex;gap:7px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.dict-filter-row::-webkit-scrollbar{display:none}
.dict-filter{padding:6px 14px;border-radius:50px;border:2px solid #E0D8CC;background:var(--white);font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;cursor:pointer;white-space:nowrap;color:var(--muted);transition:.15s}
.dict-filter:hover{border-color:var(--pink)}
.dict-filter.active{background:var(--pink);border-color:#E05A8A;color:#7A1A2A}
.dict-stats{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:12px;padding:0 4px}
.dict-results{display:grid;grid-template-columns:1fr;gap:8px}
.dict-item{background:var(--white);border-radius:var(--r);padding:14px 16px;border:2px solid #F0E8DC;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .18s}
.dict-item:hover{border-color:var(--pink);transform:translateX(4px);box-shadow:0 3px 0 rgba(224,90,138,.12)}
.di-emoji{font-size:28px;flex-shrink:0;width:40px;text-align:center}
.di-body{flex:1;min-width:0}
.di-word{font-family:'Baloo 2',cursive;font-size:17px;font-weight:800;color:var(--text)}
.di-row{display:flex;align-items:center;gap:8px;margin-top:2px;flex-wrap:wrap}
.di-phonetic{font-size:12px;color:var(--muted);font-weight:600}
.di-meaning{font-size:13px;font-weight:700;color:#E05A8A}
.di-unit{font-size:10px;font-weight:800;padding:2px 8px;border-radius:50px;background:#F0F8FF;color:#1A6FA6;border:1.5px solid #BDE0FE}
.di-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
.di-speak{width:34px;height:34px;border-radius:50%;border:none;background:#E0F8FF;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s}
.di-speak:hover{background:var(--sky);transform:scale(1.1)}
.di-star{width:34px;height:34px;border-radius:50%;border:none;background:#FFF3CC;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s}
.di-star:hover{background:var(--yellow);transform:scale(1.1)}
.di-star.on{background:#FFB347}
/* Detail card */
.dict-detail{background:var(--white);border-radius:var(--rbig);padding:24px 20px;border:3px solid var(--pink);box-shadow:0 6px 0 rgba(224,90,138,.12);margin-bottom:14px}
.dd-top{display:flex;align-items:flex-start;gap:14px;margin-bottom:16px}
.dd-emoji{font-size:52px;line-height:1}
.dd-info{flex:1}
.dd-word{font-family:'Baloo 2',cursive;font-size:30px;font-weight:800;color:var(--text);line-height:1.1}
.dd-phonetic{font-size:14px;color:var(--muted);font-weight:600;margin-top:4px}
.dd-meaning{font-size:18px;font-weight:800;color:#E05A8A;margin-top:6px}
.dd-unit-tag{display:inline-block;margin-top:8px;font-size:11px;font-weight:800;padding:3px 10px;border-radius:50px;background:#F0F8FF;color:#1A6FA6;border:2px solid #BDE0FE}
.dd-actions{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.dd-btn{display:flex;align-items:center;gap:6px;padding:10px 18px;border-radius:50px;border:none;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;transition:.15s}
.dd-btn:hover{transform:translateY(-2px)}
.dd-btn.speak{background:linear-gradient(135deg,#BDE0FE,#89C4F4);color:#042C53;box-shadow:0 3px 0 rgba(0,0,0,.1)}
.dd-btn.star{background:linear-gradient(135deg,#FFE066,#FFB347);color:#7A5C00;box-shadow:0 3px 0 rgba(0,0,0,.1)}
.dd-btn.star.on{background:linear-gradient(135deg,#FFB347,#FF9422)}
.dd-example{background:#FFF5FA;border-radius:12px;padding:12px 16px;border-left:4px solid var(--pink);margin-bottom:10px}
.dd-example-label{font-size:10px;font-weight:800;color:#C0394F;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.dd-example-text{font-size:14px;font-weight:700;color:var(--text)}
.dd-example-vi{font-size:12px;color:var(--muted);font-weight:600;margin-top:3px}
.dd-also{margin-top:14px}
.dd-also-title{font-size:12px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.dd-also-grid{display:flex;flex-wrap:wrap;gap:7px}
.dd-also-chip{padding:6px 12px;border-radius:50px;background:#F5F3EE;border:2px solid #E0D8CC;font-size:12px;font-weight:700;cursor:pointer;color:var(--text);transition:.15s}
.dd-also-chip:hover{border-color:var(--pink);background:#FFF5FA}
.dict-empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:15px;font-weight:600}
.dict-empty span{font-size:40px;display:block;margin-bottom:10px}
/* ─── PASSWORD SCREEN ─── */
.pw-overlay{position:fixed;inset:0;background:rgba(45,36,22,.6);z-index:600;display:flex;align-items:center;justify-content:center;padding:16px}
.pw-box{background:var(--white);border-radius:var(--rbig);padding:32px 26px;width:100%;max-width:360px;text-align:center;box-shadow:0 12px 40px rgba(0,0,0,.2);animation:popIn .3s both}
.pw-lock{font-size:44px;margin-bottom:12px}
.pw-title{font-family:'Baloo 2',cursive;font-size:20px;font-weight:800;margin-bottom:4px}
.pw-sub{font-size:13px;color:var(--muted);font-weight:600;margin-bottom:20px}
.pw-input{width:100%;padding:13px 16px;border-radius:var(--r);border:2.5px solid #F0E8DC;font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;text-align:center;outline:none;background:#FAFAF5;color:var(--text);letter-spacing:2px;transition:.2s}
.pw-input:focus{border-color:var(--pink);background:white}
.pw-input.wrong{border-color:#E05A5A;background:#FFE4E4;animation:shake .3s}
.pw-btn{width:100%;padding:13px;margin-top:12px;border-radius:var(--r);border:none;background:linear-gradient(135deg,#FF9AA2,#FFB347);color:white;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;cursor:pointer;box-shadow:0 4px 0 #E07030;transition:.15s}
.pw-btn:hover{transform:translateY(-2px)}
.pw-err{color:#E05A5A;font-size:13px;font-weight:700;margin-top:10px;min-height:20px}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
/* ─── PROFILE MODAL ─── */
.profile-overlay{position:fixed;inset:0;background:rgba(45,36,22,.55);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px}
.profile-box{background:var(--white);border-radius:var(--rbig);padding:28px 24px;width:100%;max-width:400px;box-shadow:0 12px 40px rgba(0,0,0,.18);animation:popIn .3s both}
.profile-box h2{font-family:'Baloo 2',cursive;font-size:22px;font-weight:800;margin-bottom:4px;text-align:center}
.profile-box p{font-size:13px;color:var(--muted);font-weight:600;text-align:center;margin-bottom:20px}
.profile-field{margin-bottom:14px}
.profile-field label{display:block;font-size:12px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.profile-input{width:100%;padding:13px 16px;border-radius:var(--r);border:2.5px solid #F0E8DC;font-family:'Nunito',sans-serif;font-size:16px;font-weight:700;color:var(--text);outline:none;transition:.2s;background:#FAFAF5}
.profile-input:focus{border-color:var(--pink);background:white}
.profile-start{width:100%;padding:14px;border-radius:var(--r);border:none;background:linear-gradient(135deg,#FF9AA2,#FFB347);color:white;font-family:'Nunito',sans-serif;font-size:16px;font-weight:800;cursor:pointer;box-shadow:0 4px 0 #E07030;transition:.15s;margin-top:6px}
.profile-start:hover{transform:translateY(-2px)}
.profile-avatar{width:70px;height:70px;border-radius:50%;background:linear-gradient(135deg,#FFB3C6,#BDE0FE);display:flex;align-items:center;justify-content:center;font-size:36px;margin:0 auto 14px;transition:.2s}
.av-opt{width:40px;height:40px;border-radius:50%;background:#F5F3EE;border:2.5px solid transparent;display:inline-flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;transition:all .18s;user-select:none}
.av-opt:hover{background:#FFE8EE;border-color:var(--pink);transform:scale(1.15)}
.av-opt.selected{background:#FFD6E8;border-color:#E05A8A;transform:scale(1.2);box-shadow:0 2px 8px rgba(224,90,138,.3)}
/* ─── PROFILE CHIP in header ─── */
.profile-chip{display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:50px;background:#FFF5FA;border:2px solid var(--pink);font-size:13px;font-weight:800;color:#C0394F;cursor:pointer;transition:.15s}
.profile-chip:hover{background:#FFD6E8}
@media(max-width:480px){
  .units-grid{grid-template-columns:1fr 1fr}
  .mode-grid{grid-template-columns:1fr 1fr}
  .opts{grid-template-columns:1fr}
}
/* ─── UNSCRAMBLE ─── */
.mb-unscram{border-color:#B5EAD7;background:#F0FFF8}
.unsw{max-width:520px;margin:0 auto}
.unsw-card{background:var(--white);border-radius:var(--rbig);padding:26px 20px;border:3px solid var(--mint);box-shadow:0 4px 0 rgba(0,0,0,.08);margin-bottom:14px}
.unsw-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.unsw-num{font-size:12px;font-weight:800;color:var(--muted)}
.unsw-skip{padding:6px 14px;border-radius:50px;border:2px solid #E0D8CC;background:var(--white);font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;cursor:pointer;color:var(--muted);transition:.15s}
.unsw-skip:hover{border-color:#FF9AA2;color:#C0394F}
.unsw-label{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:8px}
.unsw-meaning{font-family:'Baloo 2',cursive;font-size:22px;font-weight:800;color:#E05A8A;text-align:center;margin-bottom:4px}
.unsw-phonetic{font-size:13px;color:var(--muted);font-weight:600;text-align:center;margin-bottom:18px}
/* answer slots */
.unsw-slots{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;min-height:48px;padding:10px;background:#F8FBFF;border-radius:14px;border:2.5px dashed #BDE0FE;margin-bottom:14px;align-items:center;transition:.2s}
.unsw-slots.ok-bg{background:#D4F4E2;border-color:#3DB86A}
.unsw-slots.no-bg{background:#FFE4E4;border-color:#E05A5A}
.unsw-slot{width:38px;height:42px;border-radius:9px;background:var(--white);border:2.5px solid #BDE0FE;display:flex;align-items:center;justify-content:center;font-family:'Baloo 2',cursive;font-size:18px;font-weight:800;color:#1A5080;cursor:pointer;transition:all .18s;user-select:none}
.unsw-slot:hover{background:#FFE4E4;border-color:#E05A5A;color:#7A1A1A}
.unsw-slot.space-slot{background:transparent;border-color:transparent;width:14px;cursor:default}
.unsw-slot:hover.space-slot{background:transparent}
/* letter bank */
.unsw-bank{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;min-height:48px;padding:10px;background:#F5F3EE;border-radius:14px;margin-bottom:14px;align-items:center}
.unsw-letter{width:38px;height:42px;border-radius:9px;background:var(--white);border:2.5px solid #D0E8FF;display:flex;align-items:center;justify-content:center;font-family:'Baloo 2',cursive;font-size:18px;font-weight:800;color:#1A5080;cursor:pointer;transition:all .18s;user-select:none;box-shadow:0 2px 0 rgba(0,0,0,.07)}
.unsw-letter:hover{border-color:var(--mint);background:#F0FFF8;transform:translateY(-2px)}
.unsw-letter.used{opacity:.28;pointer-events:none;transform:none}
.unsw-letter.space-letter{background:transparent;border-color:transparent;width:14px;cursor:default;box-shadow:none}
.unsw-actions{display:flex;gap:9px}
.unsw-check{flex:1;padding:12px;border-radius:var(--r);border:none;background:linear-gradient(135deg,#B5EAD7,#06D6A0);color:#0E5C3C;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;cursor:pointer;box-shadow:0 4px 0 #2A9B6A;transition:.15s}
.unsw-check:hover{transform:translateY(-2px)}
.unsw-clear{padding:12px 16px;border-radius:var(--r);border:2px solid #E0D8CC;background:white;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;color:var(--muted)}
.unsw-clear:hover{border-color:#FF9AA2;color:#C0394F}
.unsw-hint-btn{padding:12px 14px;border-radius:var(--r);border:2px solid var(--yellow);background:#FFFBE6;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;color:#7A5C00;transition:.15s}
.unsw-hint-btn:hover{background:var(--yellow)}
.unsw-fb{padding:12px 15px;border-radius:var(--r);font-size:14px;font-weight:700;text-align:center;margin-top:11px}
.unsw-fb.ok{background:#D4F4E2;color:#1A5C34}
.unsw-fb.no{background:#FFE4E4;color:#7A1A1A}
.unsw-next{width:100%;margin-top:10px;padding:12px;border-radius:var(--r);border:none;background:linear-gradient(135deg,#FF9AA2,#FFB347);color:white;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;cursor:pointer;box-shadow:0 4px 0 #E07030;transition:.15s}
.unsw-next:hover{transform:translateY(-2px)}
.unsw-emoji{font-size:44px;text-align:center;display:block;margin-bottom:8px}
.unsw-hint-letters{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin-top:8px}
.unsw-hint-chip{padding:4px 10px;border-radius:50px;background:#FFF5FA;border:2px solid var(--pink);font-size:12px;font-weight:800;color:#C0394F}
@media(max-width:480px){.unsw-letter,.unsw-slot{width:34px;height:38px;font-size:16px}}
/* ════════ GARDEN SYSTEM ════════ */
@keyframes sway{0%,100%{transform:rotate(-2deg)}50%{transform:rotate(2deg)}}
@keyframes wilt{0%,100%{transform:rotate(-10deg) scaleY(.72)}50%{transform:rotate(1deg) scaleY(.76)}}
@keyframes plantPop{0%{transform:scale(.8) translateX(-50%)}60%{transform:scale(1.1) translateX(-50%)}100%{transform:scale(1) translateX(-50%)}}
@keyframes glowPulse{0%,100%{filter:drop-shadow(0 0 0 transparent)}50%{filter:drop-shadow(0 0 14px #66BB6A)}}
@keyframes xpRise{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-65px) scale(.6)}}
@keyframes coinAnim{0%{opacity:1;transform:translateY(0) scale(1.3)}100%{opacity:0;transform:translateY(-55px) scale(.7)}}
@keyframes lvFlash{0%{background:rgba(255,253,200,0)}40%{background:rgba(255,253,200,.8)}100%{background:rgba(255,253,200,0)}}
@keyframes lvBadge{0%{opacity:0;transform:scale(.3) rotate(-8deg)}70%{opacity:1;transform:scale(1.08) rotate(2deg)}100%{opacity:1;transform:scale(1)}}
@keyframes sparkAnim{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--sx),var(--sy)) scale(0)}}
@keyframes charBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes waterDrop{0%{opacity:1;transform:translateY(-20px)}100%{opacity:0;transform:translateY(55px)}}
@keyframes flameFl{0%,100%{transform:scaleY(1) rotate(-2deg)}50%{transform:scaleY(1.1) rotate(2deg)}}
.garden-page{display:flex;flex-direction:column;gap:14px;padding-bottom:30px}
.garden-scene{background:linear-gradient(180deg,#B3DEF5 0%,#D6EEFF 40%,#C8E89A 70%,#8BC34A 100%);border-radius:var(--rbig);overflow:hidden;position:relative;height:300px;border:3px solid rgba(255,255,255,.8);box-shadow:0 6px 0 rgba(0,0,0,.08)}
.gd-cloud{position:absolute;opacity:.7;animation:cloudDrift 18s ease-in-out infinite alternate}
@keyframes cloudDrift{from{transform:translateX(-20px)}to{transform:translateX(20px)}}
.gd-ground{position:absolute;bottom:0;left:0;right:0;height:90px;background:linear-gradient(180deg,#8BC34A 0%,#689F38 20%,#6D4C41 38%,#5D4037 100%)}
.gd-ground::before{content:'';position:absolute;top:0;left:0;right:0;height:20px;background:linear-gradient(180deg,#9CCC65,#7CB342);border-radius:60% 60% 0 0/25px 25px 0 0}
.gd-bed{position:absolute;bottom:48px;left:50%;transform:translateX(-50%);width:110px;height:36px;background:radial-gradient(ellipse,#5D4037 0%,#4E342E 80%);border-radius:50%;box-shadow:0 4px 0 #3E2723}
.gd-char{position:absolute;bottom:60px;transition:left .7s cubic-bezier(.34,1.56,.64,1)}
.gd-char-body{animation:charBob 2s ease-in-out infinite}
.gd-plant{position:absolute;bottom:68px;left:50%;transform:translateX(-50%);transition:all .5s;transform-origin:bottom center}
.gd-plant.pop{animation:plantPop .6s cubic-bezier(.34,1.56,.64,1) forwards}
.gd-plant.glowing{animation:glowPulse 1.5s ease 3}
.gd-plant .lp{animation:sway 2.8s ease-in-out infinite;transform-origin:bottom center}
.gd-plant.wilted .lp{animation:wilt 4s ease-in-out infinite}
.gd-sign{position:absolute;bottom:60px;right:14px;background:#DEB887;border:2.5px solid #8D6E63;border-radius:8px;padding:5px 9px;font-size:11px;font-weight:800;color:#4E342E;text-align:center;box-shadow:0 3px 0 #6D4C41;max-width:80px}
.gd-hud{position:absolute;top:10px;left:10px;right:10px;display:flex;justify-content:space-between;pointer-events:none}
.gd-hud-pill{background:rgba(255,255,255,.88);backdrop-filter:blur(4px);border-radius:50px;padding:5px 12px;display:flex;align-items:center;gap:5px;font-size:12px;font-weight:800;color:#37474F;box-shadow:0 2px 6px rgba(0,0,0,.1)}
.gd-xpbar-wrap{position:absolute;bottom:4px;left:10px;right:10px}
.gd-xpbar{height:9px;background:rgba(255,255,255,.35);border-radius:5px;overflow:hidden}
.gd-xpfill{height:100%;background:linear-gradient(90deg,#66BB6A,#AED581);border-radius:5px;transition:width .9s cubic-bezier(.4,0,.2,1)}
.gd-xpfill.glow{box-shadow:0 0 10px #AED581}
.garden-stats-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.gd-stat-card{background:var(--white);border-radius:var(--r);padding:14px 16px;border:2.5px solid #F0E8DC;box-shadow:0 3px 0 rgba(0,0,0,.06)}
.gd-stat-label{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.gd-stat-val{font-family:'Baloo 2',cursive;font-size:22px;font-weight:800;color:var(--text)}
.gd-stat-sub{font-size:11px;color:var(--muted);font-weight:600;margin-top:2px}
.gd-lv-bar{height:7px;background:#F0EDE6;border-radius:4px;overflow:hidden;margin-top:7px}
.gd-lv-fill{height:100%;background:linear-gradient(90deg,#FF9AA2,#FFB347);border-radius:4px;transition:width .8s}
.gd-stages-scroll{display:flex;gap:8px;overflow-x:auto;padding:4px 2px 8px;scrollbar-width:none}
.gd-stages-scroll::-webkit-scrollbar{display:none}
.gd-stage-chip{flex-shrink:0;background:var(--white);border:2px solid #F0E8DC;border-radius:12px;padding:8px 10px;text-align:center;font-size:10px;font-weight:700;color:var(--muted);min-width:62px}
.gd-stage-chip.done{background:#F0FFF8;border-color:#B5EAD7;color:#1A7A4A}
.gd-stage-chip.current{background:#E8F5E9;border-color:#4CAF50;color:#2E7D32;box-shadow:0 2px 8px rgba(76,175,80,.2)}
.gd-stage-chip .sc-em{font-size:18px;display:block;margin-bottom:2px}
.gd-stage-chip .sc-lv{font-size:9px;opacity:.65}
.water-btn{width:100%;padding:14px;border-radius:var(--r);border:none;background:linear-gradient(135deg,#42A5F5,#1565C0);color:white;font-family:'Baloo 2',cursive;font-size:17px;font-weight:800;cursor:pointer;box-shadow:0 4px 0 #0D47A1,0 5px 16px rgba(21,101,192,.3);transition:all .15s;display:flex;align-items:center;justify-content:center;gap:8px}
.water-btn:hover{transform:translateY(-2px)}
.water-btn:active{transform:translateY(2px);box-shadow:0 2px 0 #0D47A1}
.water-btn:disabled{opacity:.45;cursor:not-allowed;transform:none}
.char-pick-row{display:flex;gap:12px;justify-content:center;margin:10px 0}
.char-pick{width:90px;border-radius:var(--r);padding:12px 8px;text-align:center;border:3px solid transparent;background:var(--white);cursor:pointer;transition:all .2s;box-shadow:0 3px 0 rgba(0,0,0,.07)}
.char-pick:hover{transform:translateY(-3px)}
.char-pick.selected{border-color:#E05A8A;background:#FFF0F5}
.char-pick .cp-emoji{font-size:36px;margin-bottom:4px}
.char-pick .cp-name{font-size:12px;font-weight:800;color:var(--text)}
.plant-pick-row{display:flex;gap:10px;justify-content:center;margin:8px 0}
.plant-pick{flex:1;max-width:110px;border-radius:var(--r);padding:12px 8px;text-align:center;border:2.5px solid #F0E8DC;background:var(--white);cursor:pointer;transition:all .2s}
.plant-pick:hover{transform:translateY(-2px)}
.plant-pick.selected{border-color:#4CAF50;background:#F1F8E9}
.plant-pick .pp-h{height:52px;display:flex;align-items:flex-end;justify-content:center;margin-bottom:6px}
.plant-pick .pp-name{font-size:12px;font-weight:800;color:var(--text)}
#gd-levelup{position:fixed;inset:0;z-index:9000;pointer-events:none;display:flex;align-items:center;justify-content:center;display:none}
#gd-levelup.show{display:flex;animation:lvFlash .8s ease forwards}
.gd-lv-badge{background:linear-gradient(135deg,#FFD54F,#FF6F00);border-radius:24px;padding:24px 40px;text-align:center;box-shadow:0 8px 32px rgba(255,111,0,.45);animation:lvBadge .6s cubic-bezier(.34,1.56,.64,1) both}
.gd-lv-badge h2{font-family:'Baloo 2',cursive;font-size:34px;font-weight:800;color:white;text-shadow:0 3px 0 rgba(0,0,0,.2)}
.gd-lv-badge p{font-size:15px;font-weight:800;color:rgba(255,255,255,.9);margin-top:4px}
.xp-float-el,.coin-float-el{position:fixed;pointer-events:none;z-index:8000;font-family:'Baloo 2',cursive;font-size:20px;font-weight:800}
.xp-float-el{color:#2E7D32;text-shadow:0 2px 4px rgba(0,0,0,.12);animation:xpRise 1.2s forwards}
.coin-float-el{animation:coinAnim 1s forwards}
.sparkle-el{position:fixed;pointer-events:none;z-index:8000;font-size:13px;animation:sparkAnim .9s forwards}
.water-anim-el{position:absolute;pointer-events:none;animation:waterDrop .7s ease-in forwards;font-size:18px}
/* ════════ FRIEND SYSTEM ════════ */
.fr-page{display:flex;flex-direction:column;gap:12px;padding-bottom:30px}
.fr-tab-row{display:flex;gap:8px;background:rgba(255,252,240,.96);border-radius:18px;padding:8px;border:2.5px solid #EDE0C8}
.fr-tab{flex:1;padding:9px 6px;border-radius:12px;border:none;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;background:transparent;color:var(--muted);transition:.15s;text-align:center}
.fr-tab.active{background:linear-gradient(135deg,#FF9AA2,#FFB347);color:white;box-shadow:0 3px 0 #E07030}
.fr-card{background:rgba(255,252,240,.96);border-radius:18px;padding:16px;border:2.5px solid #EDE0C8;box-shadow:0 3px 0 rgba(0,0,0,.06)}
.fr-card-title{font-size:13px;font-weight:800;color:#6D4C41;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;display:flex;align-items:center;gap:6px}
/* Profile card */
.fr-profile{background:linear-gradient(135deg,#FFF0F5,#F0F8FF);border-radius:18px;padding:18px;border:2.5px solid #FFB3C6;box-shadow:0 4px 0 rgba(0,0,0,.07);text-align:center}
.fr-profile-id{font-size:11px;font-weight:800;color:var(--muted);background:#F0EDE6;border-radius:50px;padding:4px 14px;display:inline-block;margin-bottom:10px;cursor:pointer;transition:.15s}
.fr-profile-id:hover{background:#FFD6E8}
.fr-avatar{width:68px;height:68px;border-radius:50%;background:linear-gradient(135deg,#FFB3C6,#BDE0FE);display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 10px;border:3px solid white;box-shadow:0 3px 8px rgba(0,0,0,.12)}
.fr-name{font-family:'Baloo 2',cursive;font-size:20px;font-weight:800;color:var(--text)}
.fr-stats-row{display:flex;gap:8px;justify-content:center;margin-top:10px;flex-wrap:wrap}
.fr-stat-pill{background:white;border:2px solid #F0E8DC;border-radius:50px;padding:5px 12px;font-size:12px;font-weight:800;color:var(--text);display:flex;align-items:center;gap:5px}
/* Friend item */
.fr-item{display:flex;align-items:center;gap:12px;background:white;border:2px solid #F0E8DC;border-radius:16px;padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:all .2s}
.fr-item:hover{transform:translateX(4px);border-color:#FFB3C6;box-shadow:0 3px 0 rgba(255,179,198,.3)}
.fr-item-avatar{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#FFB3C6,#BDE0FE);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;border:2px solid white;box-shadow:0 2px 6px rgba(0,0,0,.1)}
.fr-item-info{flex:1;min-width:0}
.fr-item-name{font-family:'Baloo 2',cursify;font-size:15px;font-weight:800;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fr-item-sub{font-size:11px;color:var(--muted);font-weight:600;margin-top:2px}
.fr-item-plant{width:42px;height:42px;flex-shrink:0;display:flex;align-items:flex-end;justify-content:center}
.fr-item-lv{background:linear-gradient(135deg,#FFD54F,#FF8F00);border-radius:50px;padding:3px 10px;font-size:11px;font-weight:800;color:white;flex-shrink:0}
/* Add friend input */
.fr-add-input{width:100%;padding:13px 16px;border-radius:var(--r);border:2.5px solid #F0E8DC;font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;color:var(--text);outline:none;background:#FAFAF5;transition:.2s;margin-bottom:10px}
.fr-add-input:focus{border-color:var(--pink);background:white}
.fr-add-btn{width:100%;padding:13px;border-radius:var(--r);border:none;background:linear-gradient(135deg,#FF9AA2,#FFB347);color:white;font-family:'Baloo 2',cursive;font-size:16px;font-weight:800;cursor:pointer;box-shadow:0 4px 0 #E07030;transition:.15s}
.fr-add-btn:hover{transform:translateY(-2px)}
/* Visit garden */
.fr-garden-scene{position:relative;border-radius:20px;overflow:hidden;height:260px;border:3px solid rgba(255,255,255,.9);box-shadow:0 6px 0 rgba(0,0,0,.08);margin-bottom:12px;background:linear-gradient(180deg,#5BA3D9 0%,#7EC8E3 30%,#A8DAEA 55%,#C5ECA4 70%,#8BC34A 82%,#6d9e30 100%)}
/* Water friend btn */
.fr-water-btn{width:100%;padding:13px;border-radius:var(--r);border:none;background:linear-gradient(135deg,#29B6F6,#0277BD);color:white;font-family:'Baloo 2',cursive;font-size:16px;font-weight:800;cursor:pointer;box-shadow:0 4px 0 #01579B;transition:.15s;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px}
.fr-water-btn:hover{transform:translateY(-2px)}
.fr-water-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
/* Sticker reactions */
.fr-sticker-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.fr-sticker{width:52px;height:52px;border-radius:50%;background:white;border:2.5px solid #F0E8DC;display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer;transition:all .2s;box-shadow:0 2px 0 rgba(0,0,0,.08)}
.fr-sticker:hover{transform:scale(1.2) rotate(10deg);border-color:#FFB3C6;box-shadow:0 4px 0 rgba(255,179,198,.4)}
/* Floating sticker animation */
.sticker-float{position:fixed;pointer-events:none;z-index:9500;font-size:36px;animation:stickerFly 1.5s forwards}
@keyframes stickerFly{0%{opacity:1;transform:translateY(0) scale(1) rotate(0)}50%{opacity:1;transform:translateY(-80px) scale(1.4) rotate(20deg)}100%{opacity:0;transform:translateY(-160px) scale(.6) rotate(-10deg)}}
/* Leaderboard */
.fr-lb-item{display:flex;align-items:center;gap:10px;background:white;border:2px solid #F0E8DC;border-radius:14px;padding:10px 14px;margin-bottom:7px}
.fr-lb-rank{font-family:'Baloo 2',cursive;font-size:18px;font-weight:800;width:30px;text-align:center;flex-shrink:0}
.fr-lb-rank.r1{color:#FFD700}.fr-lb-rank.r2{color:#C0C0C0}.fr-lb-rank.r3{color:#CD7F32}
/* Online dot */
.fr-online{width:10px;height:10px;border-radius:50%;background:#4CAF50;border:2px solid white;position:absolute;bottom:0;right:0}
/* Empty states */
.fr-empty{text-align:center;padding:30px 20px;color:var(--muted);font-size:14px;font-weight:600}
.fr-empty-icon{font-size:40px;display:block;margin-bottom:8px}
/* Firebase status */
.fb-status{font-size:11px;font-weight:700;padding:3px 10px;border-radius:50px;display:inline-flex;align-items:center;gap:4px}
.fb-status.ok{background:#E8F5E9;color:#2E7D32;border:1.5px solid #A5D6A7}
.fb-status.err{background:#FFEBEE;color:#C62828;border:1.5px solid #EF9A9A}
.fb-status.loading{background:#FFF8E1;color:#F57F17;border:1.5px solid #FFD54F}
</style>

let starred=new Set(JSON.parse(localStorage.getItem('st2')||'[]'));
let wrongWords=JSON.parse(localStorage.getItem('ww2')||'[]');
let streak=parseInt(localStorage.getItem('str2')||'0');
let lastDate=localStorage.getItem('ld2')||'';
let useStarred=false;

(function(){
  const today=new Date().toDateString();
  if(lastDate===today)return;
  if(lastDate===new Date(Date.now()-86400000).toDateString())streak++;
  else streak=1;
  localStorage.setItem('str2',streak);localStorage.setItem('ld2',today);
})();

function saveStarred(){localStorage.setItem('st2',JSON.stringify([...starred]));updateUI();}
function saveWrong(){localStorage.setItem('ww2',JSON.stringify(wrongWords));}
function updateUI(){document.getElementById('star-total').textContent=starred.size;document.getElementById('streak-num').textContent=streak;}
function shuffle(a){return[...a].sort(()=>Math.random()-.5);}
function getAllWords(){return UNITS.flatMap(u=>u.lessons.flatMap(l=>l.words));}
function getStarredWords(){return getAllWords().filter(w=>starred.has(w.w));}
function speak(text){if('speechSynthesis'in window){const u=new SpeechSynthesisUtterance(text);u.lang='en-US';u.rate=0.85;speechSynthesis.speak(u);}}
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2000);}
function C(id){return document.getElementById(id);}

function getWordsForMode(uid){
  const u=UNITS[uid];const all=u.lessons.flatMap(l=>l.words);
  if(useStarred){const s=all.filter(w=>starred.has(w.w));return s.length?s:all;}
  return all;
}

  saveStarred();
  const b=C('fcstar');if(b)b.className='fc-btn fc-star'+(starred.has(word)?' starred':'');
}
function renderFlashDone(){

// ══════ QUIZ ══════
let qz={pool:[],idx:0,score:0,done:false,answered:false,wrongW:[],unitId:0};
function startQuiz(uid){
  resetSessionTimer();
  const words=uid===-1?getStarredWords():uid===-2?shuffle(getAllWords()).slice(0,15):getWordsForMode(uid);
  if(words.length<2){toast('⚠️ Cần ít nhất 2 từ!');return;}
  qz={pool:shuffle(words).slice(0,Math.min(uid===-2?15:10,words.length)),idx:0,score:0,done:false,answered:false,wrongW:[],unitId:uid};
  const backFn=uid<0?`showMyWords()`:uid===-2?`startBossQuiz()`:null;
  renderQuizScreen(backFn||`showUnit(${uid})`);
}
function renderQuizScreen(backTarget){
  C('content').innerHTML=`
  <button class="back-btn" onclick="${backTarget}">← Quay lại</button>
  <div class="quiz-wrap">
    <div class="quiz-scorebar"><div><div class="qs-score" id="qss">0</div><div class="qs-lbl">Điểm</div></div>
    <div class="qs-prog"><div class="qs-fill" id="qsf" style="width:0%"></div></div>
    <div class="qs-num" id="qsn">0/${qz.pool.length}</div></div>
    <div id="qza"></div>
  </div>`;
  renderQ();
}
function renderQ(){
  const area=C('qza');if(!area)return;
  C('qss').textContent=qz.score;C('qsn').textContent=`${qz.idx}/${qz.pool.length}`;C('qsf').style.width=(qz.idx/qz.pool.length*100)+'%';
  if(qz.done){renderQResult();return;}
  const item=qz.pool[qz.idx];
  const wrongs=shuffle(getAllWords().filter(v=>v.w!==item.w)).slice(0,3).map(v=>v.m);
  const opts=shuffle([item.m,...wrongs]);
  area.innerHTML=`<div class="quiz-card pop"><span class="qc-emoji">${item.e}</span>
  <div class="qc-q">Từ "<strong>${item.w}</strong>" ${item.p} có nghĩa là gì?</div>
  <div class="opts">${opts.map(o=>`<button class="opt" onclick="answerQ(this,'${o.replace(/'/g,"\\'")}','${item.m.replace(/'/g,"\\'")}')">${o}</button>`).join('')}</div>
  <div id="qfb"></div></div>`;
}
function answerQ(btn,chosen,correct){
  if(qz.answered)return;qz.answered=true;
  document.querySelectorAll('.opt').forEach(b=>b.disabled=true);
  const fb=C('qfb');
  if(chosen===correct){btn.classList.add('correct');qz.score++;fb.innerHTML=`<div class="qc-fb ok">✅ Đúng rồi! Giỏi lắm! 🌟</div>`;gdOnCorrect(btn);}
  else{btn.classList.add('wrong');document.querySelectorAll('.opt').forEach(b=>{if(b.textContent===correct)b.classList.add('correct');});fb.innerHTML=`<div class="qc-fb no">❌ Đáp án: <strong>${correct}</strong></div>`;qz.wrongW.push(qz.pool[qz.idx].w);}
  fb.innerHTML+=`<button class="qc-next" onclick="advQ()">${qz.idx+1>=qz.pool.length?'🏁 Kết quả':'Câu tiếp →'}</button>`;
  C('qss').textContent=qz.score;C('qsn').textContent=`${qz.idx+1}/${qz.pool.length}`;C('qsf').style.width=((qz.idx+1)/qz.pool.length*100)+'%';
}
function advQ(){qz.idx++;qz.answered=false;if(qz.idx>=qz.pool.length)qz.done=true;renderQ();}
function renderQResult(){
  const s=qz.score,t=qz.pool.length,pct=Math.round(s/t*100);
  const stars=pct>=90?'⭐⭐⭐':pct>=60?'⭐⭐':'⭐';
  const msg=pct===100?'Hoàn hảo! Bé thiên tài! 🎉':pct>=90?'Tuyệt vời!':pct>=60?'Khá tốt! Ôn thêm nhé!':'Cố gắng lên bé! 💪';
  if(qz.wrongW.length){wrongWords=[...new Set([...wrongWords,...qz.wrongW])];saveWrong();}
  C('qza').innerHTML=`<div class="result-wrap pop"><div class="res-stars">${stars}</div><div class="res-big">${s}/${t}</div><div class="res-msg">${msg}</div>
  ${qz.wrongW.length?`<div style="font-size:13px;font-weight:800;margin:16px 0 8px;text-align:left">📝 Từ chưa nhớ:</div><div style="margin-bottom:12px">${qz.wrongW.map(w=>`<span class="wrong-chip">${w}</span>`).join('')}</div>`:''}
  <div class="res-btns">
    <button class="res-btn primary" onclick="startQuiz(${qz.unitId})">🔁 Làm lại</button>
    ${qz.unitId>=0?`<button class="res-btn secondary" onclick="showUnit(${qz.unitId})">← Quay lại</button>`:''}
  </div></div>`;
  trackQuizResult();
}

function startTyping(uid){resetSessionTimer();ty={words:shuffle(uid===-1?getStarredWords():getWordsForMode(uid)),idx:0,score:0,unitId:uid};renderTyping();}
function renderTyping(){

  const w=ty.words[ty.idx];
  C('content').innerHTML=`

      <input class="type-input" id="tyinp" placeholder="Gõ từ tiếng Anh..." oninput="updateHints('${w.w.replace(/'/g,"\\'")}')" onkeydown="if(event.key==='Enter')checkTyping('${w.w.replace(/'/g,"\\'")}')">

      </div>
      <div id="tyfb"></div>

  </div>`;
  setTimeout(()=>{const el=C('tyinp');if(el)el.focus();},100);

function updateHints(word){
  const inp=C('tyinp');if(!inp)return;
  const val=inp.value.toLowerCase();
  const letters=document.querySelectorAll('.type-letter');
  let li=0;
  word.split('').forEach((ch,ci)=>{
    if(ch===' ')return;
    const l=letters[li++];if(!l)return;
    if(val[ci]===undefined){l.textContent='_';l.className='type-letter';}
    else if(val[ci]===ch.toLowerCase()){l.textContent=ch;l.className='type-letter filled';}
    else{l.textContent=val[ci];l.className='type-letter wrong-l';}
  });
}
function checkTyping(word){
  const inp=C('tyinp');if(!inp)return;
  const val=inp.value.trim().toLowerCase();
  const fb=C('tyfb');
  if(val===word.toLowerCase()){inp.className='type-input correct-in';ty.score++;gdOnCorrect(inp,2);if(fb)fb.innerHTML=`<div class="type-fb ok">✅ Đúng! +2 XP 🎉</div>`;setTimeout(()=>{ty.idx++;renderTyping();},1100);}
  else{inp.className='type-input wrong-in';if(fb)fb.innerHTML=`<div class="type-fb no">❌ Thử lại! Gợi ý: <strong>${word[0]}${word.slice(1).replace(/[^ ]/g,'_')}</strong></div>`;setTimeout(()=>{if(C('tyinp'))C('tyinp').className='type-input';},600);}
}
function renderTypingDone(){

let mem={cards:[],open:[],matched:0,moves:0,unitId:0,timer:0,ti:null};
function startMemory(uid){
  const words=shuffle(uid===-1?getStarredWords():getWordsForMode(uid)).slice(0,8);
  if(words.length<2){toast('⚠️ Cần ít nhất 2 từ!');return;}
  const pairs=[...words.map(w=>({id:w.w,face:w.w,type:'en',emoji:w.e})),...words.map(w=>({id:w.w,face:w.m,type:'vi',emoji:'🇻🇳'}))];
  mem={cards:shuffle(pairs).map((p,i)=>({...p,idx:i,revealed:false,matched:false})),open:[],matched:0,moves:0,unitId:uid,timer:0,ti:null};
  renderMem();
  mem.ti=setInterval(()=>{mem.timer++;const el=C('mtime');if(el)el.textContent=mem.timer+'s';},1000);
}
function renderMem(){
  const back=mem.unitId>=0?`showUnit(${mem.unitId})`:`showMyWords()`;
  C('content').innerHTML=`
  <button class="back-btn" onclick="clearInterval(mem.ti);${back}">← Quay lại</button>
  <div class="mem-wrap">
    <div class="mem-stats">
      <div class="mem-stat"><div class="ms-val" style="color:#E05A8A" id="mmatch">${mem.matched}</div><div class="ms-lbl">Ghép đúng</div></div>
      <div class="mem-stat"><div class="ms-val" style="color:#1A6FA6" id="mmoves">${mem.moves}</div><div class="ms-lbl">Lượt lật</div></div>
      <div class="mem-stat"><div class="ms-val" style="color:#1A7A4A" id="mtime">0s</div><div class="ms-lbl">Thời gian</div></div>
    </div>
    <div class="mem-grid" style="grid-template-columns:repeat(4,1fr)" id="mgrid">
      ${mem.cards.map(card=>`<div class="mem-card${card.revealed||card.matched?' open':''}${card.matched?' matched':''}" id="mc${card.idx}" onclick="flipMem(${card.idx})">
        <div class="mem-inner"><div class="mem-face mem-back-face">🌟</div>
        <div class="mem-face mem-front-face">${card.type==='en'?card.emoji+' '+card.face:card.face}</div></div>
      </div>`).join('')}
    </div>
  </div>`;
}
function flipMem(idx){
  const card=mem.cards[idx];
  if(card.matched||card.revealed||mem.open.length>=2)return;
  card.revealed=true;C('mc'+idx).classList.add('open');mem.open.push(idx);
  if(mem.open.length===2){
    mem.moves++;if(C('mmoves'))C('mmoves').textContent=mem.moves;
    const[a,b]=mem.open.map(i=>mem.cards[i]);
    if(a.id===b.id&&a.type!==b.type){
      mem.matched++;mem.open.forEach(i=>mem.cards[i].matched=true);mem.open=[];
      if(C('mmatch'))C('mmatch').textContent=mem.matched;
      if(mem.matched===mem.cards.length/2){clearInterval(mem.ti);setTimeout(()=>{
        toast(`🎉 ${mem.moves} lượt, ${mem.timer}s!`);
        C('mgrid').insertAdjacentHTML('afterend',`<div class="result-wrap pop" style="margin-top:14px">
          <div class="res-stars">⭐⭐⭐</div><div class="res-big" style="font-size:30px">${mem.moves} lượt • ${mem.timer}s</div>
          <div class="res-msg">Bé ghép hết rồi! 🎊</div>
          <div class="res-btns"><button class="res-btn primary" onclick="startMemory(${mem.unitId})">🔁 Chơi lại</button></div>
        </div>`);},400);}
    }else{setTimeout(()=>{mem.open.forEach(i=>{mem.cards[i].revealed=false;const e=C('mc'+i);if(e)e.classList.remove('open');});mem.open=[];},850);}
  }
}

let dg={sents:[],idx:0,placed:[],unitId:0};
function startDrag(uid){

function renderDrag(){

  C('content').innerHTML=`

    <div class="word-bank" id="dgbank">
      ${tokens.map((t,i)=>`<span class="tok bank" id="dgb${i}" draggable="true"
        ondragstart="event.dataTransfer.setData('i','${i}');event.dataTransfer.setData('w','${t.replace(/'/g,"\\'")}')"
        onclick="dgClick('${t.replace(/'/g,"\\'")}',${i})">${t}</span>`).join('')}

function dgClick(w,i){const el=C('dgb'+i);if(el&&el.classList.contains('used'))return;if(el)el.classList.add('used');dgAdd(w,i);}
function handleDrop(e){e.preventDefault();e.currentTarget.classList.remove('dov');const i=e.dataTransfer.getData('i'),w=e.dataTransfer.getData('w');const el=C('dgb'+i);if(!el||el.classList.contains('used'))return;el.classList.add('used');dgAdd(w,i);}
function dgAdd(w,i){
  dg.placed.push({w,i});const ph=C('dgph');if(ph)ph.style.display='none';
  const da=C('dgdrop');const chip=document.createElement('span');chip.className='tok placed';chip.textContent=w;chip.dataset.i=i;
  chip.onclick=()=>{dg.placed=dg.placed.filter(x=>x.i!=i);const s=C('dgb'+i);if(s)s.classList.remove('used');chip.remove();if(!da.querySelector('.tok.placed')){const p=C('dgph');if(p)p.style.display='';}C('dgres').innerHTML='';};
  da.appendChild(chip);
}
function dgClear(){dg.placed=[];document.querySelectorAll('.tok.bank').forEach(t=>t.classList.remove('used'));document.querySelectorAll('#dgdrop .tok.placed').forEach(t=>t.remove());const ph=C('dgph');if(ph)ph.style.display='';C('dgres').innerHTML='';if(C('dgdrop'))C('dgdrop').className='drop-area';}
function dgCheck(){
  const s=dg.sents[dg.idx%dg.sents.length];const ans=dg.placed.map(x=>x.w);const res=C('dgres');const da=C('dgdrop');
  if(!ans.length){res.innerHTML=`<div class="dc-res hint">⚠️ Hãy chọn các từ nhé!</div>`;return;}
  if(JSON.stringify(ans)===JSON.stringify(s.answer)){da.className='drop-area ok';res.innerHTML=`<div class="dc-res ok">🎉 Đúng! Câu hoàn chỉnh: <strong>${s.answer.join(' ')}</strong></div><button class="dc-next" onclick="dg.idx++;renderDrag()">Câu tiếp →</button>`;}
  else{da.className='drop-area no';res.innerHTML=`<div class="dc-res no">❌ Chưa đúng! Có ${s.answer.length} từ. Thử lại!</div>`;setTimeout(()=>{if(C('dgdrop'))C('dgdrop').className='drop-area';},700);}
}

let tq={pool:[],idx:0,score:0,done:false,answered:false,mode:'en',unitId:0,total:15,log:[]};

function startTextQuiz(uid, mode, total){
  resetSessionTimer();
  const isGrand = uid === -3;
  let words;
  if(isGrand){
    words = shuffle(getAllWords());
  } else if(uid === -1){
    words = getStarredWords();
  } else {
    words = getWordsForMode(uid);
  }
  if(words.length < 2){ toast('⚠️ Cần ít nhất 2 từ!'); return; }
  const n = total || (isGrand ? 20 : 15);
  tq = {
    pool: shuffle(words).slice(0, Math.min(n, words.length)),
    idx: 0, score: 0, done: false, answered: false,
    mode: mode || 'en', unitId: uid, total: n, log: []
  };
  renderTQ();
}

function renderTQ(){
  const backTarget = tq.unitId >= 0 ? `showUnit(${tq.unitId})` : tq.unitId === -3 ? `showGrandQuizMenu()` : `showMyWords()`;
  const modeLabel = tq.mode === 'en' ? '🔤 Anh → Việt' : '🔡 Việt → Anh';
  const modeClass = tq.mode === 'en' ? 'en' : 'vi';
  C('content').innerHTML = `
  <button class="back-btn" onclick="${backTarget}">← Quay lại</button>
  <div class="tq-wrap">
    <div class="tq-header">
      <span class="tq-mode-pill ${modeClass}">${modeLabel}</span>
      <div style="flex:1;margin:0 10px">
        <div style="font-size:12px;font-weight:700;color:var(--muted)">${tq.unitId >= 0 ? 'Unit '+(tq.unitId+1)+': '+UNITS[tq.unitId].title : tq.unitId === -3 ? 'Grand Quiz – Tổng hợp' : 'My Words'}</div>
      </div>
      <button class="tq-swap-btn" onclick="tq.mode=tq.mode==='en'?'vi':'en';tq.answered=false;renderTQ()">🔄 Đổi chiều</button>
    </div>
    <div class="tq-scorebar">
      <div><div class="tq-score-big" id="tqs">0</div><div class="tq-score-lbl">Điểm</div></div>
      <div class="tq-prog"><div class="tq-prog-fill" id="tqpf" style="width:0%"></div></div>
      <div class="tq-count" id="tqn">0/${tq.pool.length}</div>
    </div>
    <div id="tqa"></div>
  </div>`;
  renderTQQ();
}

function renderTQQ(){
  const area = C('tqa');
  if(!area) return;
  C('tqs').textContent = tq.score;
  C('tqn').textContent = `${tq.idx}/${tq.pool.length}`;
  C('tqpf').style.width = (tq.idx / tq.pool.length * 100) + '%';

  if(tq.done){ renderTQResult(); return; }

  const item = tq.pool[tq.idx];
  const isEN = tq.mode === 'en';
  const modeClass = isEN ? 'en' : 'vi';

  // Generate 3 wrong answers from full word pool
  const allW = getAllWords();
  const wrongs = shuffle(allW.filter(v => v.w !== item.w))
    .slice(0, 3)
    .map(v => isEN ? v.m : v.w);
  const correctAns = isEN ? item.m : item.w;
  const opts = shuffle([correctAns, ...wrongs]);

  const question = isEN ? item.w : item.m;
  const subLabel = isEN ? `${item.p}` : '';

  area.innerHTML = `
  <div class="tq-card mode-${modeClass} pop">
    <div class="tq-question-label ${modeClass}">
      ${isEN ? '🔤 Từ tiếng Anh này nghĩa là gì?' : '🔡 Dịch sang tiếng Anh là?'}
      <span style="margin-left:auto;font-size:12px;opacity:.6">${tq.idx+1}/${tq.pool.length}</span>
    </div>
    <div class="tq-question">${question}</div>
    ${subLabel ? `<div class="tq-phonetic">${subLabel}</div>` : '<div style="margin-bottom:22px"></div>'}
    <div class="tq-opts">
      ${opts.map(o => `<button class="tq-opt mode-${modeClass}"
        onclick="answerTQ(this,'${o.replace(/'/g,"\\'")}','${correctAns.replace(/'/g,"\\'")}')">${o}</button>`).join('')}
    </div>
    <div id="tqfb"></div>
  </div>`;
}

function answerTQ(btn, chosen, correct){
  if(tq.answered) return;
  tq.answered = true;
  document.querySelectorAll('.tq-opt').forEach(b => b.disabled = true);
  const fb = C('tqfb');
  const item = tq.pool[tq.idx];
  if(chosen === correct){
    btn.classList.add('correct');
    tq.score++;
    tq.log.push({item, ok: true});
    gdOnCorrect(btn);
    if(fb) fb.innerHTML = `<div class="tq-fb ok">✅ Đúng rồi! Giỏi lắm! 🌟</div>`;
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.tq-opt').forEach(b => { if(b.textContent === correct) b.classList.add('correct'); });
    tq.log.push({item, ok: false});
    if(fb) fb.innerHTML = `<div class="tq-fb no">❌ Chưa đúng! Đáp án đúng: <strong>${correct}</strong></div>`;
  }
  if(fb) fb.innerHTML += `<button class="tq-next" onclick="advTQ()">${tq.idx+1 >= tq.pool.length ? '🏁 Xem kết quả' : 'Câu tiếp →'}</button>`;
  C('tqs').textContent = tq.score;
  C('tqn').textContent = `${tq.idx+1}/${tq.pool.length}`;
  C('tqpf').style.width = ((tq.idx+1) / tq.pool.length * 100) + '%';
}

function advTQ(){
  tq.idx++; tq.answered = false;
  if(tq.idx >= tq.pool.length) tq.done = true;
  renderTQQ();
}

const EXAMPLES = {};
UNITS.forEach(u=>{

    const words = s.q.toLowerCase().split(/\s+/);
    words.forEach(w=>{

// Build full word index with unit info
function buildWordIndex(){
  const index=[];
  UNITS.forEach(u=>{
    u.lessons.forEach(l=>{
      l.words.forEach(w=>{
        if(!index.find(x=>x.w===w.w)){
          index.push({...w, unit:u.id, unitTitle:u.title, unitEmoji:u.emoji, lesson:l.label||''});
        }
      });
    });
  });
  return index.sort((a,b)=>a.w.localeCompare(b.w));
}

function startUnscramble(uid){
  let words;
  if(uid === -4) words = shuffle(getAllWords()).slice(0, 15);
  else if(uid === -1){ words = getStarredWords(); if(!words.length){ toast('⚠️ Chưa có từ ⭐!'); return; } words = shuffle(words).slice(0,15); }

  resetSessionTimer();
  us = { words, idx:0, score:0, unitId:uid, placed:[], bank:[], hintsUsed:0 };
  renderUnscramble();
}

function buildBank(word){
  // Chỉ lấy chữ cái, KHÔNG lấy dấu cách — dấu cách tự chèn khi check
  const letters = word.split('').filter(ch => ch !== ' ');
  let tries = 0, sc;
  do {
    sc = [...letters].sort(() => Math.random() - .5);
    tries++;
  } while(tries < 20 && sc.join('') === letters.join(''));
  return sc.map((ch, i) => ({ ch, id: i }));
}

// Lấy cấu trúc khoảng cách của từ gốc
// VD: "next to" → [4, 2] (word lengths)
function getWordLengths(word){
  return word.split(' ').map(w => w.length);
}

// Chèn dấu cách vào answer dựa theo cấu trúc từ gốc
function insertSpaces(letters, word){
  const lengths = getWordLengths(word);
  if(lengths.length === 1) return letters.join(''); // từ 1 chữ không cần
  let result = '';
  let i = 0;
  lengths.forEach((len, wi) => {
    result += letters.slice(i, i + len).join('');
    if(wi < lengths.length - 1) result += ' ';
    i += len;
  });
  return result;
}

  if(us.idx >= us.words.length){ renderUnscrambleDone(); return; }
  const w = us.words[us.idx];
  us.bank = buildBank(w.w);
  us.placed = [];
  const back = us.unitId >= 0 ? `showUnit(${us.unitId})` : `showUnscrambleMenu()`;
  const wordLengths = getWordLengths(w.w);

  C('content').innerHTML = `
